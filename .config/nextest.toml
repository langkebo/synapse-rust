[profile.ci]
fail-fast = false
retries = 2
# B.3: raised from 4 → 8 (DB pool max=40 supports the extra concurrency;
# SHARED_CLONE_SEMAPHORE was raised to match in src/test_utils.rs).
test-threads = 8
flaky-result = "fail"

[profile.ci.junit]
path = "artifacts/nextest-junit.xml"

# P4-3: TDD profile for fast Red-Green-Refactor cycles.
# Usage: cargo nextest run -p <crate> <test_name> -P tdd
# - fail-fast=true: stop on first failure (RED should be immediate)
# - retries=0: no flaky masking; if RED fails, it fails now
# - flaky-result=fail: treat flaky as failure (don't hide real bugs)
[profile.tdd]
fail-fast = true
retries = 0
flaky-result = "fail"

# Dev profile for zero-flags test runs.
# Usage: cargo nextest run --profile test
#         cargo nextest run --profile test --lib          (lib tests only)
#         cargo nextest run --profile test --test unit     (unit test target)
#         cargo nextest run --profile test --test integration  (needs DB)
#
# Includes test-utils feature so lib tests that import test_mocks
# from sibling crates compile correctly.
[profile.test]
features = "test-utils"
fail-fast = true
retries = 0
