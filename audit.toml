reason = """
paste 1.0.15 — unmaintained.
Transitive dependency: image -> ravif -> rav1e -> paste. Used only at
compile time for macro generation in image processing. No runtime risk.
Will resolve when upstream `image` updates its rav1e dep tree.

Owner: synapse-rust maintainers
Review-by: 2026-06-30
See: https://rustsec.org/advisories/RUSTSEC-2024-0436
"""

