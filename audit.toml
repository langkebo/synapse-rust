# cargo-audit configuration (this is the canonical filename cargo-audit looks for).
# Keep cargo-audit.toml in sync if you continue maintaining it for tooling history.

[advisories]

[[advisories.ignore]]
id = "RUSTSEC-2023-0071"
reason = """
rsa 0.9.10 — Marvin Attack (timing side-channel on PKCS#1 v1.5 *decryption*).

Why this is accepted in this repo:
1. The Marvin attack requires a decryption oracle: an attacker submits chosen
   ciphertexts and observes whether/how long PKCS#1 v1.5 unpadding takes.
2. Direct usage of the `rsa` crate in this codebase is in
   src/services/builtin_oidc_provider.rs and is restricted to
   `pkcs1v15::SigningKey` / `RsaPrivateKey::to_pkcs8_pem` — i.e. *signature
   generation* over OIDC ID tokens. There is no PKCS#1 v1.5 *decryption* code
   path exposed to network input.
3. The remaining transitive path is through sqlx-mysql (pulled in by
   sqlx-macros-core's driver detection). That code is not invoked at runtime
   because the project connects only to PostgreSQL.
4. No upstream fix is available in the rsa 0.9.x line.

Mitigation tracking: a future migration of the OIDC signing keys from RS256 to
ES256 (ed25519/ECDSA, already used elsewhere in the project) will let us drop
the direct rsa dependency entirely. Tracked separately, not blocking releases.

Owner: synapse-rust maintainers
Review-by: 2026-06-30
See: https://rustsec.org/advisories/RUSTSEC-2023-0071
"""

[[advisories.ignore]]
