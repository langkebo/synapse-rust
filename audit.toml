[[advisories.ignore]]
id = "RUSTSEC-2026-0097"
reason = """
rand 0.8.5 / 0.10.0 — unsoundness when combined with a custom logger that
calls rand::rng() during a panic. This codebase does not install a custom
logger of that shape (uses tracing_subscriber::fmt). No fixed release exists
in the dependency graph. Block new rand::rng() usages and re-evaluate when
upstream patches.

Owner: synapse-rust maintainers
Review-by: 2026-05-15
See: https://rustsec.org/advisories/RUSTSEC-2026-0097
"""
