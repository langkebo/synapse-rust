  enabled: false

rate_limit:
  enabled: false

admin_registration:
  enabled: true
  secret: "admin_secret_for_local_dev"
  shared_secret: "admin_shared_secret_for_local_dev"

worker:
  enabled: false

cors:
  allowed_origins:
    - "http://localhost:8008"
    - "http://127.0.0.1:8008"
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"
    - "http://localhost:5173"
    - "http://127.0.0.1:5173"
    - "tauri://localhost"
    - "https://tauri.localhost"
    - "vector://vector"
    - "file://"
  allow_credentials: true
  allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
  allowed_headers:
