[package]
name = "synapse-rust"
version = "0.1.0"
edition = "2021"
rust-version = "1.93.0"
authors = ["Synapse Rust Team"]
description = "Matrix Homeserver implemented in Rust"

[features]
default = ["server"]
server = ["dep:axum", "dep:tower-http", "dep:tower_governor"]
runtime-ddl = []
performance-tests = []

[dependencies]
tokio = { version = "1.49", features = ["full", "test-util"] }
async-trait = "0.1"

axum = { version = "0.8", optional = true, features = ["macros"] }
tower = "0.5"
tower-http = { version = "0.6", optional = true, features = ["fs", "cors", "trace", "compression-gzip", "limit"] }
tower_governor = { version = "0.8", optional = true, features = ["axum", "tracing"] }
hyper = "1"
http = "1"

sqlx = { version = "0.8", features = ["postgres", "runtime-tokio", "chrono", "json", "uuid", "ipnetwork", "migrate", "macros"] }
ipnetwork = "0.20"
deadpool = "0.12"
deadpool-postgres = "0.12"

redis = { version = "0.27", features = ["aio", "tokio-comp"] }
deadpool-redis = "0.18"
moka = { version = "0.12", features = ["future", "sync"] }
lru = "0.16.3"

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_with = "3"
serde_yaml = "0.9"

rand = "0.8"
sha1 = "0.10"
sha2 = "0.10"
hmac = "0.12"
base64 = "0.22"
zeroize = "1"

argon2 = "0.5"
aes-gcm = "0.10"
chacha20poly1305 = "0.10"
ed25519-dalek = "2.0"
x25519-dalek = { version = "2.0", features = ["static_secrets"] }
generic-array = "0.14"
typenum = "1"

vodozemac = "0.9"

config = "0.14"

jsonwebtoken = "9"

metrics = "0.23"
metrics-exporter-prometheus = "0.15"

tracing = "0.1"
tracing-opentelemetry = "0.32"
opentelemetry = { version = "0.31", features = ["metrics", "logs"] }
opentelemetry-otlp = { version = "0.31", features = ["grpc-tonic", "metrics", "logs"] }
opentelemetry_sdk = { version = "0.31", features = ["rt-tokio"] }
opentelemetry-semantic-conventions = "0.31"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
tracing-appender = "0.2"

chrono = { version = "0.4", features = ["serde"] }
time = "0.3.47"

thiserror = "2.0"
anyhow = "1.0"
uuid = { version = "1", features = ["v4", "serde"] }
once_cell = "1"
futures = "0.3"
futures-util = "0.3"
tokio-util = { version = "0.7", features = ["io"] }
bytes = "1"
dashmap = { version = "6", features = ["serde"] }
parking_lot = "0.12"
lazy_static = "1"
regex = "1.10"
quick-xml = "0.37"
lazy-regex = "3"
flate2 = "1.0"
url = "2.5"
urlencoding = "2.1"

elasticsearch = "8.15.0-alpha.1"

reqwest = { version = "0.12", features = ["json"] }
validator = { version = "0.20.0", features = ["derive"] }
infer = "0.19.0"
textwrap = "0.16"

image = "0.25"
hex = "0.4.3"

[dev-dependencies]
criterion = { version = "0.5", features = ["async_tokio"] }
fake = "2.9"
quickcheck = "1.0"
quickcheck_macros = "1.0"
tempfile = "3"
tokio = { version = "1", features = ["full"] }
arbitrary = { version = "1", features = ["derive"] }
mockall = "0.13"
wiremock = "0.6"

[profile.dev]
opt-level = 1
debug = true

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true
incremental = false

[profile.bench]
inherits = "release"
debug = true

[[bench]]
name = "performance_api_benchmarks"
path = "benches/performance_api_benchmarks.rs"
harness = false

[[bench]]
name = "performance_federation_benchmarks"
path = "benches/performance_federation_benchmarks.rs"
harness = false

[workspace]

[[test]]
name = "integration"
path = "tests/integration/mod.rs"

[[test]]
name = "schema_contract_room_core_tests"
path = "tests/integration/schema_contract_room_core_tests.rs"

[[test]]
name = "schema_contract_room_summary_tests"
path = "tests/integration/schema_contract_room_summary_tests.rs"

[[test]]
name = "schema_contract_space_tests"
path = "tests/integration/schema_contract_space_tests.rs"

[[test]]
