[[test]]
name = "schema_contract_retention_tests"
path = "tests/integration/schema_contract_retention_tests.rs"

[[test]]
name = "schema_contract_invite_restrictions_tests"
path = "tests/integration/schema_contract_invite_restrictions_tests.rs"

[[test]]
name = "schema_contract_auth_tokens_tests"
path = "tests/integration/schema_contract_auth_tokens_tests.rs"

[[test]]
name = "schema_contract_presence_tests"
path = "tests/integration/schema_contract_presence_tests.rs"

[[test]]
name = "schema_contract_openid_token_tests"
path = "tests/integration/schema_contract_openid_token_tests.rs"

[[test]]
name = "schema_contract_media_quota_tests"
path = "tests/integration/schema_contract_media_quota_tests.rs"

[[test]]
name = "schema_contract_receipts_tests"
path = "tests/integration/schema_contract_receipts_tests.rs"

[[test]]
name = "schema_contract_sync_unread_tests"
path = "tests/integration/schema_contract_sync_unread_tests.rs"

[[test]]
name = "schema_contract_receipts_aggregation_tests"
path = "tests/integration/schema_contract_receipts_aggregation_tests.rs"

[[test]]
name = "schema_contract_read_markers_handler_tests"
path = "tests/integration/schema_contract_read_markers_handler_tests.rs"

[[test]]
name = "schema_contract_sync_ephemeral_receipts_tests"
path = "tests/integration/schema_contract_sync_ephemeral_receipts_tests.rs"

[[test]]
name = "unit"
path = "tests/unit/mod.rs"

[[test]]
name = "e2e"
path = "tests/e2e/mod.rs"

[[test]]
name = "performance_manual"
path = "tests/performance/mod.rs"
required-features = ["performance-tests"]
