name: Benchmark

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      run_benchmarks:
        description: Run Criterion benchmarks
        required: false
        default: true
        type: boolean
      run_performance_manual:
        description: Run manual performance test target
        required: false
        default: false
        type: boolean
      run_performance_soak:
        description: Run performance soak gate
        required: false
        default: false
        type: boolean
      soak_base_url:
        description: Base URL for soak environment
        required: false
        default: ''
        type: string
      soak_duration:
        description: Soak duration passed to k6
        required: false
        default: 24h
        type: string
      soak_vus:
        description: Concurrent users for soak gate
        required: false
        default: '40'
        type: string

jobs:
  benchmark:
    name: Run benchmarks
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_benchmarks == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/release/deps/
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      - name: Run benchmarks
        run: |
          : > benchmark.txt
          cargo bench --locked --bench performance_api_benchmarks -- --output-format bencher | tee -a benchmark.txt
          cargo bench --locked --bench performance_federation_benchmarks -- --output-format bencher | tee -a benchmark.txt

      - name: Analyze results
        run: |
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat benchmark.txt >> $GITHUB_STEP_SUMMARY

      - name: Upload benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'cargo'
          output-file-path: benchmark.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          comment-on-alert: true
          alert-threshold: '10%'
          fail-on-alert: true

      - name: Store benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark.txt
          retention-days: 30

  performance-comparison:
    name: Performance comparison
    runs-on: ubuntu-latest
    needs: benchmark
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download baseline results
        uses: dawidd6/action-download-artifact@v3
        if: github.event_name == 'pull_request'
        with:
          workflow: benchmark.yml
          name: benchmark-results
          path: baseline
          check_artifacts: true
          search_artifacts: true

      - name: Download current results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          path: current

      - name: Compare results
        run: |
          if [ -f baseline/benchmark.txt ] && [ -f current/benchmark.txt ]; then
            echo "## Performance Comparison" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Comparing with baseline..." >> $GITHUB_STEP_SUMMARY
            diff baseline/benchmark.txt current/benchmark.txt || true
          else
            echo "No baseline found for comparison"
          fi

  performance-manual:
    name: Run manual performance tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_performance_manual == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Run manual performance suite
        run: cargo test --features performance-tests --test performance_manual -- --nocapture

  performance-soak:
    name: Run performance soak gate
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_performance_soak == 'true')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Resolve soak target
        env:
          WORKFLOW_SOAK_BASE_URL: ${{ github.event.inputs.soak_base_url }}
          SECRET_SOAK_BASE_URL: ${{ secrets.PERF_SOAK_BASE_URL }}
        run: |
          SOAK_BASE_URL="${WORKFLOW_SOAK_BASE_URL:-$SECRET_SOAK_BASE_URL}"
          if [ -z "$SOAK_BASE_URL" ]; then
            echo "PERF_SOAK_BASE_URL is required for soak gate"
            exit 1
          fi
          echo "SOAK_BASE_URL=$SOAK_BASE_URL" >> "$GITHUB_ENV"

      - name: Run soak guardrail
        env:
          BASE_URL: ${{ env.SOAK_BASE_URL }}
          RESULTS_DIR: artifacts/perf_soak
          SOAK_DURATION: ${{ github.event.inputs.soak_duration || '24h' }}
          SOAK_VUS: ${{ github.event.inputs.soak_vus || '40' }}
        run: bash scripts/test/perf/run_tests.sh soak

      - name: Upload soak report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-soak-report
          path: artifacts/perf_soak
          retention-days: 14

  benchmark-report:
    name: Generate benchmark report
    runs-on: ubuntu-latest
    needs: benchmark
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download benchmark results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          path: reports

      - name: Generate report
        run: |
          echo "# Synapse Rust Performance Benchmark Report" > reports/REPORT.md
          echo "" >> reports/REPORT.md
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> reports/REPORT.md
          echo "**Commit:** ${{ github.sha }}" >> reports/REPORT.md
          echo "" >> reports/REPORT.md
          echo "## Results" >> reports/REPORT.md
          echo "" >> reports/REPORT.md
          cat reports/benchmark.txt >> reports/REPORT.md

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
