name: Backend Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: backend-validation-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-tests:
    name: Rust Full Test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-backend-validation-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Rust validation
        run: bash scripts/ci_backend_validation.sh rust

  migration-validation:
    name: Migration Validation
    runs-on: ubuntu-latest
    needs: rust-tests
    timeout-minutes: 35
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run migration validation
        run: bash scripts/ci_backend_validation.sh migration

  docker-smoke:
    name: Docker Smoke
    runs-on: ubuntu-latest
    needs: migration-validation
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Docker smoke validation
        run: bash scripts/ci_backend_validation.sh docker
