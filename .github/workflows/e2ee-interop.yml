name: E2EE Interop (vodozemac)

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/e2ee/**'
      - 'docs/synapse-rust/E2EE_VODOZEMAC_MIGRATION.md'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/e2ee/vodozemac_interop_tests.rs'
      - '.github/workflows/e2ee-interop.yml'
  push:
    branches:
      - main
      - develop
      - 'feature/e2ee-vodozemac/**'
  schedule:
    # Sunday 02:00 UTC, after the nightly dependency refresh.
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      element_harness_script:
        description: Element Web browser harness script to run
        required: false
        default: test:basic
        type: choice
        options:
          - test:basic
          - smoke:login

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  E2EE_INTEROP: '1'
  E2EE_INTEROP_CLIENT: 'element-web'
  E2EE_INTEROP_LOG: artifacts/e2ee-interop
  MATRIX_HOMESERVER_URL: 'http://localhost:8008'
  SDK_REPOSITORY: langkebo/matrix-js-sdk

jobs:
  vodozemac-vector-roundtrip:
    # Cheap: runs the vodozemac reference test vectors inside the
    # synapse-rust binary. Catches any regression in the local
    # vodozemac glue code without spinning up a second homeserver.
    name: Vodozemac vector roundtrip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-e2ee-interop-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-e2ee-interop-

      - name: Vodozemac interop smoke
        run: |
          mkdir -p "${E2EE_INTEROP_LOG}"
          cargo test --all-features --locked --lib \
            'e2ee::vodozemac_interop_tests' \
            -- --nocapture 2>&1 | tee "${E2EE_INTEROP_LOG}/vodozemac-smoke.log"

      - name: Upload smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2ee-interop-vodozemac-smoke
          path: ${{ env.E2EE_INTEROP_LOG }}/vodozemac-smoke.log
          retention-days: 14

  element-web-interop:
    # CI-backed cross-client verification now runs in two layers:
    # 1) matrix-js-sdk real-backend verification against a live backend.
    # 2) a browser-level Element Web harness via Playwright. Default to
    #    basic interactions so the workflow exercises login + room create
    #    + message send, while keeping workflow_dispatch overrideable.
    name: Element ecosystem verification
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/heads/feature/e2ee-vodozemac/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout matrix-js-sdk
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SDK_REPOSITORY }}
          path: matrix-js-sdk

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: matrix-js-sdk/pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-e2ee-interop-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-e2ee-interop-

      - name: Run matrix-js-sdk real-backend verification
        env:
          SDK_ROOT: ${{ github.workspace }}/matrix-js-sdk
          SDK_REPOSITORY: ${{ env.SDK_REPOSITORY }}
          DOCKER_ENV_FILE: ${{ github.workspace }}/docker/.env
          BASE_URL: http://localhost:8008
          WAIT_SECONDS: 240
          KEEP_STACK_RUNNING: '1'
        run: |
          mkdir -p "${E2EE_INTEROP_LOG}"
          bash scripts/test/run_sdk_verification_real_backend.sh \
            2>&1 | tee "${E2EE_INTEROP_LOG}/matrix-js-sdk.log"

      - name: Run Element Web browser harness
        env:
          DOCKER_ENV_FILE: ${{ github.workspace }}/docker/.env
          WAIT_SECONDS: 240
          BROWSER_ONLY_OVERLAY: '1'
          ELEMENT_HARNESS_ARTIFACT_DIR: ${{ github.workspace }}/artifacts/e2ee-interop
          ELEMENT_HARNESS_SCRIPT: ${{ github.event.inputs.element_harness_script }}
        run: |
          mkdir -p "${E2EE_INTEROP_LOG}"
          TEST_SCRIPT="${ELEMENT_HARNESS_SCRIPT:-test:basic}" \
          bash scripts/test/run_element_web_browser_harness.sh \
            2>&1 | tee "${E2EE_INTEROP_LOG}/element-web-browser.log"

      - name: Upload Element Web interop log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2ee-interop-element-web
          path: |
            ${{ env.E2EE_INTEROP_LOG }}/matrix-js-sdk.log
            ${{ env.E2EE_INTEROP_LOG }}/element-web-browser.log
            artifacts/e2ee-interop/
          retention-days: 30
