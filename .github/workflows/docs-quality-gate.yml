name: Docs Quality Gate

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  docs-quality:
    name: Docs Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install markdownlint
        run: npm i -g markdownlint-cli

      - name: markdownlint - DB Reports
        run: markdownlint -c .markdownlint.json docs/db/DIAGNOSIS_REPORT.md

      - name: markdownlint - Top-level Implementation Docs
        run: |
          markdownlint -c .markdownlint.json \
            OPTIMIZATION.md \
            docs/OPTIMIZATION_PLAN.md \
            docs/API-TEST-OPTIMIZATION-PLAN.md \
            docs/db/MIGRATION_GOVERNANCE.md \
            docs/CHANGELOG-DB.md \
            docs/ROLLBACK_RUNBOOK.md

      - name: Install aspell
        run: |
          sudo apt-get update
          sudo apt-get install -y aspell aspell-en

      - name: aspell - DB Reports
        run: |
          bash scripts/check_doc_spelling.sh docs/db/DIAGNOSIS_REPORT.md

      - name: lychee - DB Reports
        uses: lycheeverse/lychee-action@v1.10.0
        with:
          args: --base . --exclude-loopback docs/db/DIAGNOSIS_REPORT.md

      - name: lychee - Top-level Implementation Docs
        uses: lycheeverse/lychee-action@v1.10.0
        with:
          args: --base . --exclude-loopback \
            OPTIMIZATION.md \
            docs/OPTIMIZATION_PLAN.md \
            docs/API-TEST-OPTIMIZATION-PLAN.md \
            docs/db/MIGRATION_GOVERNANCE.md \
            docs/CHANGELOG-DB.md \
            docs/ROLLBACK_RUNBOOK.md
