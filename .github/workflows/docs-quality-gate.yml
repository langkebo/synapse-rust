name: Docs Quality Gate

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  docs-quality:
    name: Docs Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install markdownlint
        run: npm i -g markdownlint-cli

      - name: Discover active markdown files
        id: docs
        run: |
          # Collect root-level *.md and docs/*.md excluding all archive/ directories
          files=$(find . -maxdepth 1 -name "*.md" -type f | sort)
          docs_files=$(find docs -name "*.md" -type f -not -path "*/archive/*" 2>/dev/null | sort)
          all_files="$files"$'\n'"$docs_files"
          # Filter out empty lines and format as space-separated for shell steps
          active=$(echo "$all_files" | grep -v '^$' | tr '\n' ' ')
          echo "files=$active" >> "$GITHUB_OUTPUT"
          echo "Active docs: $active"

      - name: markdownlint - Active Docs
        run: |
          files="${{ steps.docs.outputs.files }}"
          if [ -z "$(echo "$files" | tr -d ' ')" ]; then
            echo "No markdown files to lint"
            exit 0
          fi
          markdownlint -c .markdownlint.json $files

      - name: Install aspell
        run: |
          sudo apt-get update
          sudo apt-get install -y aspell aspell-en

      - name: aspell - Active Docs
        run: |
          files="${{ steps.docs.outputs.files }}"
          if [ -z "$(echo "$files" | tr -d ' ')" ]; then
            echo "No markdown files to spell-check"
            exit 0
          fi
          for f in $files; do
            echo "--- Checking $f ---"
            bash scripts/check_doc_spelling.sh "$f" || {
              echo "::warning::Spelling issues in $f"
            }
          done

      - name: lychee - Active Docs
        uses: lycheeverse/lychee-action@v1.10.0
        with:
          args: --base . --exclude-loopback ${{ steps.docs.outputs.files }}
