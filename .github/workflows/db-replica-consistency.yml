name: DB Replica Consistency

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  logical-checksum-compare:
    name: Logical Checksum Compare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          PRIMARY_DATABASE_URL: ${{ secrets.PRIMARY_DATABASE_URL }}
          REPLICA_DATABASE_URL: ${{ secrets.REPLICA_DATABASE_URL }}
        run: |
          if [ -z "${PRIMARY_DATABASE_URL}" ] || [ -z "${REPLICA_DATABASE_URL}" ]; then
            echo "PRIMARY_DATABASE_URL / REPLICA_DATABASE_URL secrets are not configured; skipping."
            exit 0
          fi

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Compare logical checksum report (primary vs replica)
        env:
          DATABASE_URL: ${{ secrets.PRIMARY_DATABASE_URL }}
          REPLICA_DATABASE_URL: ${{ secrets.REPLICA_DATABASE_URL }}
          LOGICAL_CHECKSUM_TABLES_FILE: scripts/logical_checksum_tables.txt
          LOGICAL_CHECKSUM_REPORT: artifacts/db-logical-checksum-compare.json
          LOGICAL_CHECKSUM_REPLICA_REPORT: artifacts/db-logical-checksum-replica.json
        run: python3 scripts/generate_logical_checksum_report.py

      - name: Upload logical checksum compare report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: db-logical-checksum-compare
          path: artifacts/db-logical-checksum-compare.json

      - name: Upload logical checksum replica report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: db-logical-checksum-replica
          path: artifacts/db-logical-checksum-replica.json
