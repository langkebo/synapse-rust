name: Format Governance

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  format-compliance:
    name: Format Compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
          components: rustfmt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install format tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pre-commit ruff
          sudo apt-get update
          sudo apt-get install -y shfmt

      - name: Generate format audit report
        run: |
          mkdir -p artifacts
          python3 scripts/quality/format_audit.py --output artifacts/format_audit.md

      - name: Run format compliance
        run: bash scripts/quality/format_check.sh

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: format-audit
          path: artifacts/format_audit.md
          retention-days: 14
