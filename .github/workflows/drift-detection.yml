name: Schema Drift Detection

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'migrations/**/*.sql'
      - 'scripts/**'
  pull_request:
    branches:
      - main
    paths:
      - 'migrations/**/*.sql'
      - 'scripts/**'

env:
  FLYWAY_DB_HOST: ${{ vars.PGHOST || 'localhost' }}
  FLYWAY_DB_PORT: ${{ vars.PGPORT || '5432' }}
  FLYWAY_DB_NAME: ${{ vars.PGDATABASE || 'synapse' }}
  FLYWAY_DB_USER: ${{ vars.PGUSER || 'synapse' }}
  FLYWAY_DB_PASSWORD: ${{ secrets.PGPASSWORD || 'synapse' }}

jobs:
  drift-detection:
    name: Schema Drift Detection
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: synapse
          POSTGRES_PASSWORD: synapse
          POSTGRES_DB: synapse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: |
          pip install psycopg2-binary pg8000

      - name: Install PostgreSQL and sqlx tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          cargo install sqlx-cli --locked --no-default-features --features postgres

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U synapse; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
          echo "PostgreSQL did not start in time"
          exit 1

      - name: Prepare comparison databases
        run: |
          PGPASSWORD=synapse psql -h localhost -U synapse -d postgres -v ON_ERROR_STOP=1 -c "DROP DATABASE IF EXISTS synapse_expected;"
          PGPASSWORD=synapse psql -h localhost -U synapse -d postgres -v ON_ERROR_STOP=1 -c "DROP DATABASE IF EXISTS synapse_actual;"
          PGPASSWORD=synapse psql -h localhost -U synapse -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE synapse_expected;"
          PGPASSWORD=synapse psql -h localhost -U synapse -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE synapse_actual;"

      - name: Apply expected schema baseline and critical increments
        env:
          PGPASSWORD: synapse
        run: |
          psql -h localhost -U synapse -d synapse_expected -v ON_ERROR_STOP=1 -f migrations/00000000_unified_schema_v6.sql
          set -euo pipefail
          test -f scripts/ci/critical_migrations.txt
          while IFS= read -r migration; do
            [ -z "$migration" ] && continue
            test -f "$migration"
            psql -h localhost -U synapse -d synapse_expected -v ON_ERROR_STOP=1 -f "$migration"
          done < scripts/ci/critical_migrations.txt

      - name: Apply actual sqlx migration chain
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse_actual
        run: |
          python3 scripts/build_sqlx_migration_source.py artifacts/sqlx-migrations
          sqlx migrate run --source artifacts/sqlx-migrations

      - name: Generate expected schema from applied baseline
        run: |
          python scripts/db/extract_schema.py \
            --host localhost \
            --port 5432 \
            --database synapse_expected \
            --user synapse \
            --password synapse \
            --schema public \
            --output expected_schema.json \
            --skip-row-counts

      - name: Extract actual schema from database
        run: |
          python scripts/db/extract_schema.py \
            --host localhost \
            --port 5432 \
            --database synapse_actual \
            --user synapse \
            --password synapse \
            --schema public \
            --output actual_schema.json

      - name: Run drift detection
        id: drift
        run: |
          python scripts/db/diff_schema.py \
            expected_schema.json \
            actual_schema.json \
            --format text \
            --output drift_report.txt \
            --exit-code || true

          python scripts/db/diff_schema.py \
            expected_schema.json \
            actual_schema.json \
            --format markdown \
            --output drift_report.md \
            --exit-code || true

          python scripts/db/diff_schema.py \
            expected_schema.json \
            actual_schema.json \
            --format json \
            --output drift_report.json

          echo "## Schema Drift Report" >> $GITHUB_STEP_SUMMARY
          cat drift_report.md >> $GITHUB_STEP_SUMMARY

          blockers=$(python3 - <<'PY'
import json
with open("drift_report.json", "r", encoding="utf-8") as f:
    report = json.load(f)
print(int(report.get("summary", {}).get("blockers", 0)))
PY
)
          if [ "$blockers" -gt 0 ]; then
            echo "drift_detected=true" >> $GITHUB_OUTPUT
            echo "drift_blockers=$blockers" >> $GITHUB_OUTPUT
          else
            echo "drift_detected=false" >> $GITHUB_OUTPUT
            echo "drift_blockers=0" >> $GITHUB_OUTPUT
          fi

      - name: Upload drift report
        uses: actions/upload-artifact@v4
        if: steps.drift.outputs.drift_detected == 'true' && steps.drift.outputs.drift_blockers != '0'
        with:
          name: drift-report
          path: |
            drift_report.txt
            drift_report.md
            drift_report.json
          retention-days: 30

      - name: Fail on blockers
        if: steps.drift.outputs.drift_detected == 'true' && steps.drift.outputs.drift_blockers != '0'
        run: |
          echo "Schema drift with blockers detected!"
          echo "Blocking merge until drift is resolved."
          exit 1

  migration-validation:
    name: Migration Script Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check migration naming convention
        run: |
          echo "Checking migration script naming conventions..."
          echo "Legacy migrations (YYYYMMDDHHMMSS_*.sql) are allowed for backward compatibility."
          echo "New migrations must follow: V{version}__{Jira}_{description}.sql"
          echo ""

          legacy_errors=0
          new_format_errors=0

          for f in migrations/*.sql; do
            filename=$(basename "$f")

            if [[ "$filename" == *.undo.sql ]] || [[ "$filename" == *.down.sql ]]; then
              echo "[ROLLBACK] $filename - validated by rollback check"
              continue
            fi

            if [[ "$filename" =~ ^[0-9]{14}_.*\.sql$ ]]; then
              echo "[LEGACY] $filename - allowed (to be migrated to archive/incremental)"
              continue
            fi

            if [[ "$filename" =~ ^V[0-9]+(_[0-9]+)*__[A-Z]+-[0-9]+_[a-z0-9_]+\.sql$ ]]; then
              echo "[NEW] $filename - follows new convention"
              continue
            fi

            if [[ "$filename" =~ ^V[0-9]+_[0-9]+__.*\.sql$ ]]; then
              echo "[LEGACY-V] $filename - allowed but should be normalized to new convention later"
              continue
            fi

            if [[ "$filename" == "00000000_unified_schema_v6.sql" ]] || \
               [[ "$filename" == "99999999_unified_incremental_migration.sql" ]] || \
               [[ "$filename" == "MANIFEST-template.txt" ]]; then
              echo "[SPECIAL] $filename - baseline/unified migration"
              continue
            fi

            echo "[ERROR] $filename - invalid naming convention"
            if [[ "$filename" =~ ^V.*\.sql$ ]]; then
              new_format_errors=$((new_format_errors + 1))
            else
              legacy_errors=$((legacy_errors + 1))
            fi
          done

          echo ""
          if [ $new_format_errors -gt 0 ]; then
            echo "Found $new_format_errors migrations with invalid NEW format naming"
            echo "New migrations must follow: V{version}__{Jira}_{description}.sql"
            exit 1
          fi

          if [ $legacy_errors -gt 0 ]; then
            echo "Found $legacy_errors migrations with unrecognized naming"
            exit 1
          fi

          echo "Migration naming validation passed (legacy allowed, new format enforced)"

      - name: Check for duplicate migrations
        run: |
          echo "Checking for duplicate migration scripts..."
          duplicates=$(find migrations -maxdepth 1 -name "*.sql" -not -name "*undo*" -not -name "*rollback*" | \
            xargs basename -a 2>/dev/null | \
            sort | \
            uniq -d)

          if [ -n "$duplicates" ]; then
            echo "Duplicate migration scripts found:"
            echo "$duplicates"
            exit 1
          fi
          echo "No duplicate migration scripts found in root migrations directory"

      - name: Check for missing rollback scripts
        run: |
          echo "Checking for missing rollback scripts..."
          missing=0
          
          for f in migrations/*.sql; do
            filename=$(basename "$f")
            if [[ "$filename" == "00000000_unified_schema_v6.sql" ]] || \
               [[ "$filename" == "99999999_unified_incremental_migration.sql" ]] || \
               [[ "$filename" == *.undo.sql ]] || \
               [[ "$filename" == *.down.sql ]] || \
               [[ "$filename" == *.rollback.sql ]]; then
              continue
            fi

            if [[ ! "$filename" =~ ^[0-9]{14}_.*\.sql$ ]] && [[ ! "$filename" =~ ^V.*\.sql$ ]]; then
              continue
            fi

            rollback_name="${f%.sql}.undo.sql"
            rollback_down="${f%.sql}.down.sql"
            rollback_alt="migrations/rollback/$(basename ${f%.sql}).rollback.sql"
            
            if [ ! -f "$rollback_name" ] && [ ! -f "$rollback_down" ] && [ ! -f "$rollback_alt" ]; then
              echo "Missing rollback for: $f"
              missing=$((missing + 1))
            fi
          done
          
          if [ $missing -gt 0 ]; then
            echo "Found $missing migrations without rollback scripts"
            exit 1
          fi
          echo "All migrations have rollback scripts"

  performance-baseline:
    name: Migration Performance Baseline
    runs-on: ubuntu-latest
    container:
      image: postgres:15-alpine

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: synapse
          POSTGRES_PASSWORD: synapse
          POSTGRES_DB: synapse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U synapse; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Simulate large table for performance testing
        run: |
          rows="${PERF_TEST_ROWS:-10000000}"
          PGPASSWORD=synapse psql -h localhost -U synapse -d synapse -c "
            CREATE TABLE IF NOT EXISTS test_events (
              id BIGSERIAL PRIMARY KEY,
              room_id TEXT NOT NULL,
              event_type TEXT NOT NULL,
              content JSONB,
              created_ts BIGINT NOT NULL
            );
            
            INSERT INTO test_events (room_id, event_type, content, created_ts)
            SELECT 
              '!room:' || (random() * 100)::int || ':example.com',
              CASE (random() * 3)::int
                WHEN 0 THEN 'm.room.message'
                WHEN 1 THEN 'm.room.member'
                ELSE 'm.room.event'
              END,
              '{}'::jsonb,
              extract(epoch from now())::bigint * 1000
            FROM generate_series(1, ${rows});
          "

      - name: Run migration performance test
        run: |
          echo "Testing migration performance with ${PERF_TEST_ROWS:-10000000} rows..."
          failed=0
          for migration in \
            migrations/archive/20260322000001_performance_indexes.sql \
            migrations/archive/20260322000002_performance_indexes_v2.sql
          do
            if [ ! -f "$migration" ]; then
              echo "Missing migration benchmark target: $migration"
              failed=1
              continue
            fi

            start_time=$(python3 - <<'PY'
from time import time_ns
print(time_ns() // 1_000_000)
PY
)

            if ! PGPASSWORD=synapse psql -h localhost -U synapse -d synapse -f "$migration"; then
              failed=1
              continue
            fi

            end_time=$(python3 - <<'PY'
from time import time_ns
print(time_ns() // 1_000_000)
PY
)
            duration=$((end_time - start_time))

            echo "Migration: $(basename "$migration")"
            echo "Duration: ${duration}ms"

            if [ "$duration" -gt 30000 ]; then
              echo "Migration $(basename "$migration") exceeds 30s baseline"
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

      - name: Cleanup test data
        run: |
          PGPASSWORD=synapse psql -h localhost -U synapse -d synapse -c "DROP TABLE IF EXISTS test_events;"
