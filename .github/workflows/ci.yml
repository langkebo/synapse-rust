name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  repo-sanity:
    name: Repo Sanity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: No private keys
        run: |
          ! grep -R "BEGIN.*PRIVATE KEY" . --include="*.key" --include="*.pem" --include="*.p12"
          ! grep -R "BEGIN RSA PRIVATE KEY" . --include="*.key" --include="*.pem" --include="*.p12"

      - name: No key files tracked
        run: |
          ! git ls-files '*.key' '*.p12'

      - name: No root artifacts
        run: |
          ! ls axum_test.rs 2>/dev/null
          ! ls *.db 2>/dev/null
      
      - name: No placeholder strings in non-test code
        run: bash scripts/quality/check_no_placeholder_strings.sh

      - name: No shell routes (empty responses)
        run: bash scripts/detect_shell_routes.sh

      - name: Schema table coverage
        run: python3 scripts/check_schema_table_coverage.py

      - name: Schema contract coverage (static)
        run: |
          mkdir -p artifacts
          python3 scripts/check_schema_contract_coverage.py \
            --threshold 90 \
            --report artifacts/contract_coverage_report.md

  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: synapse
          POSTGRES_PASSWORD: synapse
          POSTGRES_DB: synapse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-features --locked -- -D warnings

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --locked --no-default-features --features postgres

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Build forward-only sqlx migration source
        run: python3 scripts/build_sqlx_migration_source.py artifacts/sqlx-migrations

      - name: Set up test database
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
        run: |
          sqlx database create
          sqlx migrate run --source artifacts/sqlx-migrations

      - name: Run doc tests
        run: cargo test --doc --locked

      - name: Run all tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          REDIS_URL: redis://localhost:6379
          RUST_BACKTRACE: 1
          RUST_LOG: info
          TEST_THREADS: 4
          TEST_RETRIES: 2
          RUN_PERF_SMOKE: 1
        run: bash scripts/run_ci_tests.sh

      - name: Upload performance smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-smoke-log
          path: artifacts/perf_smoke.log
          retention-days: 14

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run security audit
        continue-on-error: true
        run: |
          cargo install cargo-audit --locked
          cargo audit

  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release --all-features --locked

      - name: Build wasm (if applicable)
        run: cargo build --release --workspace --exclude synapse_worker --locked || true

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [test]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: synapse
          POSTGRES_PASSWORD: synapse
          POSTGRES_DB: synapse
        ports:
          - 5432:5432

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --locked --no-default-features --features postgres

      - name: Build forward-only sqlx migration source
        run: python3 scripts/build_sqlx_migration_source.py artifacts/sqlx-migrations

      - name: Set up test database
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
        run: |
          sqlx database create
          sqlx migrate run --source artifacts/sqlx-migrations

      - name: Run coverage
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          REDIS_URL: redis://localhost:6379
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          cargo tarpaulin --out Xml --out Json --out Html --scope Unit --scope Integration --ignore-tests false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./tarpaulin-report.xml
          flags: unittests
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: tarpaulin-report.*
          retention-days: 14

  quality-evidence:
    name: Quality Evidence (Non-blocking)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Collect evidence
        continue-on-error: true
        run: |
          RUN_TESTS=0 RUN_AUDIT=0 bash scripts/quality/collect_evidence.sh
          python3 scripts/quality/generate_defect_list.py --results-dir test-results --out docs/quality/defects_api_integration.md || true

      - name: Upload evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quality-evidence
          path: |
            reports/quality/**
            docs/quality/**
          retention-days: 14
