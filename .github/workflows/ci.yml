name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/synapse_test
  TEST_REDIS_URL: redis://localhost:6379

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      non-docs: ${{ steps.filter.outputs.non-docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            non-docs:
              - '**'
              - '!docs/**'
              - '!**/*.md'

  # ──────────────────────────────────────────────
  # Fast Tier — runs on every PR and push (~5 min)
  # ──────────────────────────────────────────────

  repo-sanity:
    name: Repo Sanity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: No private keys
        run: |
          ! grep -R "BEGIN.*PRIVATE KEY" . --include="*.key" --include="*.pem" --include="*.p12"
          ! grep -R "BEGIN RSA PRIVATE KEY" . --include="*.key" --include="*.pem" --include="*.p12"

      - name: No key files tracked
        run: |
          ! git ls-files '*.key' '*.p12'

      - name: No root artifacts
        run: |
          ! ls axum_test.rs 2>/dev/null
          ! ls *.db 2>/dev/null

      - name: No placeholder strings in non-test code
        run: bash scripts/quality/check_no_placeholder_strings.sh

      - name: No shell routes (empty responses)
        run: bash scripts/detect_shell_routes.sh

      - name: No unwired route candidates
        run: bash scripts/detect_unwired_route_candidates.sh

      - name: Schema table coverage
        run: python3 scripts/check_schema_table_coverage.py

      - name: Schema contract coverage (static)
        run: |
          mkdir -p artifacts
          python3 scripts/check_schema_contract_coverage.py \
            --threshold 90 \
            --report artifacts/contract_coverage_report.md

      - name: Migration consistency
        run: |
          mkdir -p artifacts
          python3 scripts/check_migration_consistency.py \
            --json-report artifacts/migration_consistency.json

  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: synapse
          POSTGRES_PASSWORD: synapse
          POSTGRES_DB: synapse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-features --locked -- -D warnings

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --locked --no-default-features --features postgres

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Build forward-only sqlx migration source
        run: python3 scripts/build_sqlx_migration_source.py artifacts/sqlx-migrations

      - name: Set up test database
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
        run: |
          sqlx database create
          sqlx migrate run --source artifacts/sqlx-migrations

      - name: Run doc tests
        run: cargo test --doc --locked

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          REDIS_URL: redis://localhost:6379
          RUST_BACKTRACE: 1
          RUST_LOG: info
          NEXTEST_RETRIES: 2
        run: cargo nextest run --lib --all-features --locked --test-threads 4

  # ──────────────────────────────────────────────────────────
  # Slow Tier — runs on merge to main/develop + weekly schedule
  # Skipped when only docs (*.md, docs/) changed
  # ──────────────────────────────────────────────────────────

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test, changes]
    if: >-
      github.event_name == 'schedule' ||
      (needs.changes.outputs.non-docs == 'true' &&
       github.event_name == 'push' &&
       (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'))

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: synapse
          POSTGRES_PASSWORD: synapse
          POSTGRES_DB: synapse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --locked --no-default-features --features postgres

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Build forward-only sqlx migration source
        run: python3 scripts/build_sqlx_migration_source.py artifacts/sqlx-migrations

      - name: Set up test database
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
        run: |
          sqlx database create
          sqlx migrate run --source artifacts/sqlx-migrations

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          REDIS_URL: redis://localhost:6379
          RUST_BACKTRACE: 1
          RUST_LOG: info
          NEXTEST_RETRIES: 2
        run: cargo nextest run --tests --all-features --locked --test-threads 4

      - name: Run performance smoke gate
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          REDIS_URL: redis://localhost:6379
          RUN_PERF_SMOKE: 1
          PERF_SMOKE_LOG: artifacts/perf_smoke.log
        run: |
          mkdir -p artifacts
          cargo test --test performance_manual --features performance-tests --locked -- --ignored --nocapture 2>&1 | tee artifacts/perf_smoke.log

      - name: Upload performance smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-smoke-log
          path: artifacts/perf_smoke.log
          retention-days: 14

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [test, changes]
    if: >-
      github.event_name == 'schedule' ||
      (needs.changes.outputs.non-docs == 'true' &&
       github.event_name == 'push' &&
       (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Run security audit
        run: |
          cargo install cargo-audit --locked
          bash scripts/run_cargo_audit.sh
          if git grep -n "rand::rng()" -- '*.rs'; then
            echo "rand::rng() is temporarily banned until RUSTSEC-2026-0097 is resolved"
            exit 1
          fi

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [test, changes]
    if: >-
      github.event_name == 'schedule' ||
      (needs.changes.outputs.non-docs == 'true' &&
       github.event_name == 'push' &&
       (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'))
    strategy:
      matrix:
        profile:
          - name: core-matrix-min
            features: server
          - name: core-private-chat
            features: server,friends,burn-after-read
          - name: all-extensions
            features: server,all-extensions
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.profile.name }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.profile.name }}-
            ${{ runner.os }}-cargo-

      - name: Build ${{ matrix.profile.name }}
        run: cargo build --release --no-default-features --features ${{ matrix.profile.features }} --locked

      - name: Build wasm (if applicable)
        if: matrix.profile.name == 'all-extensions'
        run: cargo build --release --workspace --exclude synapse_worker --locked || true

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [integration-test, changes]
    if: >-
      github.event_name == 'schedule' ||
      (needs.changes.outputs.non-docs == 'true' &&
       github.event_name == 'push' &&
       (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'))

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: synapse
          POSTGRES_PASSWORD: synapse
          POSTGRES_DB: synapse
        ports:
          - 5432:5432

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
          components: llvm-tools-preview

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --locked --no-default-features --features postgres

      - name: Build forward-only sqlx migration source
        run: python3 scripts/build_sqlx_migration_source.py artifacts/sqlx-migrations

      - name: Set up test database
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
        run: |
          sqlx database create
          sqlx migrate run --source artifacts/sqlx-migrations

      - name: Run coverage
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          REDIS_URL: redis://localhost:6379
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          cargo tarpaulin --out Xml --out Json --out Html --include-tests --locked

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./tarpaulin-report.xml
          flags: unittests
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: tarpaulin-report.*
          retention-days: 14

  quality-evidence:
    name: Quality Evidence (Non-blocking)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Collect evidence
        continue-on-error: true
        run: |
          RUN_TESTS=0 RUN_AUDIT=0 bash scripts/quality/collect_evidence.sh
          python3 scripts/quality/generate_defect_list.py --results-dir test-results --out docs/quality/defects_api_integration.md || true

      - name: Upload evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quality-evidence
          path: |
            reports/quality/**
            docs/quality/**
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  # k6 Smoke Test — manual/dispatch only
  # Requires a running Synapse server; start one via Docker or
  # point BASE_URL to an existing instance before triggering.
  # ──────────────────────────────────────────────────────────

  k6-smoke-test:
    name: k6 Smoke Test
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        run: |
          curl https://github.com/grafana/k6/releases/download/v0.47.0/k6-v0.47.0-linux-amd64.tar.gz -L | tar xvz
          sudo mv k6-*/k6 /usr/local/bin/

      - name: Run smoke test
        run: bash scripts/test/perf/run_tests.sh smoke
        env:
          BASE_URL: ${{ secrets.K6_SMOKE_BASE_URL || 'http://localhost:8448' }}
          RESULTS_DIR: artifacts/k6-smoke

      - name: Evaluate guardrails
        run: python3 scripts/test/perf/guardrail.py --results-dir artifacts/k6-smoke --scenario smoke --fail-on-breach

      - name: Upload k6 smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-smoke-results
          path: artifacts/k6-smoke
          retention-days: 14
