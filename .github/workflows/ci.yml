name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/synapse_test
  TEST_REDIS_URL: redis://localhost:6379

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      non-docs: ${{ steps.filter.outputs.non-docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            non-docs:
              - '**'
              - '!docs/**'
              - '!**/*.md'

  # ──────────────────────────────────────────────
  # Fast Tier — runs on every PR and push (~5 min)
  # ──────────────────────────────────────────────

  repo-sanity:
    name: Repo Sanity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: No private keys
        run: |
          ! grep -R "BEGIN.*PRIVATE KEY" . --include="*.key" --include="*.pem" --include="*.p12"
          ! grep -R "BEGIN RSA PRIVATE KEY" . --include="*.key" --include="*.pem" --include="*.p12"

      - name: No key files tracked
        run: |
          ! git ls-files '*.key' '*.p12'

      - name: No root artifacts
        run: |
          ! ls axum_test.rs 2>/dev/null
          ! ls *.db 2>/dev/null

      - name: Schema table coverage
        run: python3 scripts/check_schema_table_coverage.py

      - name: Schema contract coverage (static)
        run: |
          mkdir -p artifacts
          python3 scripts/check_schema_contract_coverage.py \
            --threshold 90 \
            --report artifacts/contract_coverage_report.md

      - name: Migration consistency
        run: |
          mkdir -p artifacts
          python3 scripts/check_migration_consistency.py \
            --json-report artifacts/migration_consistency.json

      - name: Route ↔ storage boundary gate
        run: bash scripts/ci/check_route_storage_boundary.sh

      # Supply-chain hardening: cargo-deny (licenses/bans/sources) and
      # cargo-audit (RustSec CVE database). Both must pass for the PR
      # to merge. The ignore list lives in deny.toml and .cargo/audit.toml.
      - name: Supply-chain gate (cargo-deny + cargo-audit)
        run: bash scripts/ci/supply_chain_gate.sh

  test:
    name: Test & Lint (${{ matrix.rust-toolchain }}, ${{ matrix.features-label }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        rust-toolchain: [stable, 1.93.0]
        features-args: ["", "--all-features"]
        include:
          - features-args: ""
            features-label: default-features
          - features-args: "--all-features"
            features-label: all-features

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: synapse
          POSTGRES_PASSWORD: synapse
          POSTGRES_DB: synapse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain (${{ matrix.rust-toolchain }})
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust-toolchain }}
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rust-toolchain }}-${{ matrix.features-label }}

      - name: Check formatting
        if: matrix.rust-toolchain == 'stable' && matrix.features-args == ''
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy ${{ matrix.features-args }} --locked -- -D warnings

      - name: Install sqlx-cli
        if: matrix.features-args == '--all-features'
        # Pin to 0.8.x: matches the project's sqlx 0.8 and stays within MSRV.
        # sqlx-cli 0.9+ requires rustc >= 1.94, which the CI toolchain lacks.
        run: cargo install sqlx-cli --version '^0.8' --locked --no-default-features --features postgres

      - name: Install cargo-nextest
        if: matrix.features-args == '--all-features'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Build forward-only sqlx migration source
        if: matrix.features-args == '--all-features'
        run: python3 scripts/build_sqlx_migration_source.py artifacts/sqlx-migrations

      - name: Set up test database
        if: matrix.features-args == '--all-features'
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
        run: |
          sqlx database create
          sqlx migrate run --source artifacts/sqlx-migrations

      - name: Run doc tests
        if: matrix.features-args == '--all-features'
        run: cargo test --doc --locked

      - name: Run library unit tests (--lib)
        if: matrix.features-args == '--all-features'
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          REDIS_URL: redis://localhost:6379
          RUST_BACKTRACE: 1
          RUST_LOG: info
          NEXTEST_RETRIES: 2
        run: cargo nextest run --lib --all-features --locked --test-threads 8

      - name: Run unit test target (--test unit)
        if: matrix.features-args == '--all-features'
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          REDIS_URL: redis://localhost:6379
          RUST_BACKTRACE: 1
          RUST_LOG: info
          NEXTEST_RETRIES: 2
        run: cargo nextest run --test unit --features test-utils --locked --test-threads 8

  # ──────────────────────────────────────────────────────────
  # Slow Tier — runs on merge to main/develop + weekly schedule
  # Skipped when only docs (*.md, docs/) changed
  # ──────────────────────────────────────────────────────────

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test, changes]
    if: >-
      github.event_name == 'schedule' ||
      (needs.changes.outputs.non-docs == 'true' &&
       github.event_name == 'push' &&
       (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'))

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: synapse
          POSTGRES_PASSWORD: synapse
          POSTGRES_DB: synapse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install sqlx-cli
        # Pin to 0.8.x: matches the project's sqlx 0.8 and stays within MSRV.
        # sqlx-cli 0.9+ requires rustc >= 1.94, which the CI toolchain lacks.
        run: cargo install sqlx-cli --version '^0.8' --locked --no-default-features --features postgres

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Install cargo-insta
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-insta

      - name: Build forward-only sqlx migration source
        run: python3 scripts/build_sqlx_migration_source.py artifacts/sqlx-migrations

      - name: Set up test database
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
        run: |
          sqlx database create
          sqlx migrate run --source artifacts/sqlx-migrations

      - name: Run integration tests (--test integration)
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          REDIS_URL: redis://localhost:6379
          RUST_BACKTRACE: 1
          RUST_LOG: info
          NEXTEST_RETRIES: 2
        run: cargo nextest run --test integration --all-features --locked --test-threads 8

      # Snapshot gate: fail if any insta snapshot drifted or is missing.
      # Local devs must run `cargo insta test --review` to accept new snapshots
      # before pushing; CI runs in non-interactive --no-review mode and fails
      # on any pending .snap.new files.
      - name: Snapshot gate (cargo insta test --no-review)
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          REDIS_URL: redis://localhost:6379
          RUST_BACKTRACE: 1
          NEXTEST_RETRIES: 2
        run: cargo insta test --no-review --test-runner nextest -- --all-features --locked --test-threads 8

      - name: Run performance smoke gate
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          REDIS_URL: redis://localhost:6379
          RUN_PERF_SMOKE: 1
          PERF_SMOKE_LOG: artifacts/perf_smoke.log
        run: |
          mkdir -p artifacts
          cargo test --test performance_manual --features performance-tests --locked -- --ignored --nocapture 2>&1 | tee artifacts/perf_smoke.log

      - name: Upload performance smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-smoke-log
          path: artifacts/perf_smoke.log
          retention-days: 14

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [test, changes]
    if: >-
      github.event_name == 'schedule' ||
      (needs.changes.outputs.non-docs == 'true' &&
       github.event_name == 'push' &&
       (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      # Run the unified supply-chain gate. This is the same script that
      # `repo-sanity` invokes for fast PR feedback, but here we also
      # assert that no `rand::rng()` calls leaked into the tree (the
      # RUSTSEC-2026-0097 watch-out).
      - name: Supply-chain gate (cargo-deny + cargo-audit)
        run: bash scripts/ci/supply_chain_gate.sh

      - name: Assert rand::rng() is unused
        run: |
          if git grep -n "rand::rng()" -- '*.rs'; then
            echo "rand::rng() is temporarily banned until RUSTSEC-2026-0097 is resolved"
            exit 1
          fi

      # m-2: Track outdated dependencies for security-relevant crates.
      # Non-blocking: only warns, does not fail the pipeline.
      # Focus on crypto crates that may need patch-level bumps.
      - name: Check outdated dependencies (cargo-outdated)
        continue-on-error: true
        run: |
          cargo install cargo-outdated --locked
          echo "=== Outdated dependencies (focus: crypto) ==="
          cargo outdated --root-deps-only 2>&1 | tee artifacts/outdated-deps.txt
          echo ""
          echo "=== Security-relevant crate status ==="
          cargo outdated 2>&1 | grep -E '(x25519-dalek|ed25519-dalek|curve25519-dalek|aes-gcm|chacha20poly1305|ring|openssl|rustls)' || echo "No updates available for tracked security crates."

      - name: Upload outdated-deps report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outdated-deps-report
          path: artifacts/outdated-deps.txt
          retention-days: 14

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [test, changes]
    if: >-
      github.event_name == 'schedule' ||
      (needs.changes.outputs.non-docs == 'true' &&
       github.event_name == 'push' &&
       (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'))
    strategy:
      matrix:
        profile:
          - name: core-matrix-min
            features: server
          - name: core-private-chat
            features: server,friends,burn-after-read
          - name: all-extensions
            features: server,all-extensions
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.profile.name }}

      - name: Build ${{ matrix.profile.name }}
        run: cargo build --release --no-default-features --features ${{ matrix.profile.features }} --locked

      - name: Build wasm (if applicable)
        if: matrix.profile.name == 'all-extensions'
        run: cargo build --release --workspace --exclude synapse_worker --locked || true

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [integration-test, changes]
    if: >-
      github.event_name == 'schedule' ||
      (needs.changes.outputs.non-docs == 'true' &&
       github.event_name == 'push' &&
       (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'))

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: synapse
          POSTGRES_PASSWORD: synapse
          POSTGRES_DB: synapse
        ports:
          - 5432:5432

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
          components: llvm-tools-preview

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Install sqlx-cli
        # Pin to 0.8.x: matches the project's sqlx 0.8 and stays within MSRV.
        # sqlx-cli 0.9+ requires rustc >= 1.94, which the CI toolchain lacks.
        run: cargo install sqlx-cli --version '^0.8' --locked --no-default-features --features postgres

      - name: Build forward-only sqlx migration source
        run: python3 scripts/build_sqlx_migration_source.py artifacts/sqlx-migrations

      - name: Set up test database
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
        run: |
          sqlx database create
          sqlx migrate run --source artifacts/sqlx-migrations

      - name: Run coverage
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          REDIS_URL: redis://localhost:6379
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          # Tarpaulin flag rationale (see scripts/run_local_coverage.sh):
          #   --workspace           cover every crate in the workspace
          #   --all-features         compile every source-level feature so all .rs files
          #                         are visible to the instrumenter
          #   --features test-utils build integration/unit/e2e test binaries declared
          #                         with `required-features = ["test-utils"]`
          #   --include-tests        run integration test targets (tests/*) in addition
          #                         to lib/bin unit tests
          #   --output-dir coverage/  collect tarpaulin-report.{xml,json,html} in one place
          #   --fail-under 25        B.3 hard floor (current 21.85% + buffer); per-file
          #                         ratchet below enforces stricter thresholds
          cargo tarpaulin \
            --workspace \
            --all-features \
            --features test-utils \
            --include-tests \
            --out Xml --out Json --out Html \
            --output-dir coverage/ \
            --fail-under 25 \
            --locked

      - name: Per-file coverage ratchet (B.3)
        # Enforces: TDD-mandated files ≥80%, new files ≥60% (ramp-up grace),
        # touched files must not regress, global floor ≥25% (warn-only).
        # Baseline at artifacts/coverage_baseline.json is auto-saved on first run
        # and auto-committed by the next step on main/develop pushes.
        run: |
          mkdir -p artifacts
          python3 scripts/check_file_coverage.py \
            --report coverage/tarpaulin-report.json \
            --baseline artifacts/coverage_baseline.json \
            --threshold 80 \
            --global-floor 25 \
            --new-file-floor 20

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/tarpaulin-report.xml
          flags: unittests
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Commit coverage baseline (auto-ratchet)
        # Only on main/develop push; skip on PRs, schedules, and dispatches.
        # The baseline file is the only artifact this step touches.
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/coverage_baseline.json
          if git diff --cached --quiet; then
            echo "No baseline change; skipping commit."
          else
            git commit -m "chore(coverage): auto-update per-file baseline [skip ci]"
            git push
          fi

  # ──────────────────────────────────────────────────────────
  # k6 Smoke Test — manual/dispatch only
  # Requires a running Synapse server; start one via Docker or
  # point BASE_URL to an existing instance before triggering.
  # ──────────────────────────────────────────────────────────

  k6-smoke-test:
    name: k6 Smoke Test
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        run: |
          curl https://github.com/grafana/k6/releases/download/v0.47.0/k6-v0.47.0-linux-amd64.tar.gz -L | tar xvz
          sudo mv k6-*/k6 /usr/local/bin/

      - name: Run smoke test
        run: bash scripts/test/perf/run_tests.sh smoke
        env:
          BASE_URL: ${{ secrets.K6_SMOKE_BASE_URL || 'http://localhost:8448' }}
          RESULTS_DIR: artifacts/k6-smoke

      - name: Evaluate guardrails
        run: python3 scripts/test/perf/guardrail.py --results-dir artifacts/k6-smoke --scenario smoke --fail-on-breach

      - name: Upload k6 smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-smoke-results
          path: artifacts/k6-smoke
          retention-days: 14
