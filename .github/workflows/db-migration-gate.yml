name: DB Migration Gate

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  schema-table-coverage:
    name: Schema Table Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate referenced tables have schema coverage
        run: |
          mkdir -p artifacts
          python3 scripts/check_schema_table_coverage.py --json-report artifacts/schema_table_coverage.json

      - name: Upload schema table coverage report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: schema-table-coverage-report
          path: artifacts/schema_table_coverage.json
          retention-days: 14

  schema-contract-coverage:
    name: Schema Contract Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate critical schema contracts with threshold
        run: |
          mkdir -p artifacts
          python3 scripts/check_schema_contract_coverage.py \
            --threshold 90 \
            --report artifacts/contract_coverage_report.md \
            --json-report artifacts/contract_coverage_report.json

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: contract-coverage-report
          path: |
            artifacts/contract_coverage_report.md
            artifacts/contract_coverage_report.json
          retention-days: 14

  migration-layout-audit:
    name: Migration Layout Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Audit migration directory layout
        run: |
          mkdir -p artifacts
          python3 scripts/audit_migration_layout.py --report artifacts/migration_layout_audit.json

      - name: Upload migration layout audit report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: migration-layout-audit-report
          path: artifacts/migration_layout_audit.json
          retention-days: 14

  migration-manifest-integrity:
    name: Migration Manifest Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate manifest
        run: |
          python3 scripts/generate_migration_manifest.py \
            --release ci \
            --jira SYS-0001 \
            --owner synapse-rust \
            --output artifacts/MANIFEST-ci.txt

      - name: Verify manifest
        run: python3 scripts/verify_migration_manifest.py artifacts/MANIFEST-ci.txt

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: migration-manifest
          path: artifacts/MANIFEST-ci.txt
          retention-days: 30

  external-evidence-gate:
    name: External Evidence Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate external evidence is complete
        run: python3 scripts/check_external_evidence_complete.py

  unified-schema-apply:
    name: Unified Schema Apply
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: synapse
          POSTGRES_PASSWORD: synapse
          POSTGRES_DB: synapse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client postgresql-contrib

      - name: Apply unified schema
        env:
          PGPASSWORD: synapse
        run: |
          psql -h localhost -U synapse -d synapse -v ON_ERROR_STOP=1 -f migrations/00000000_unified_schema_v6.sql

      - name: Apply post-schema critical increments
        env:
          PGPASSWORD: synapse
        run: |
          set -euo pipefail
          test -f scripts/ci/critical_migrations.txt
          while IFS= read -r migration; do
            [ -z "$migration" ] && continue
            test -f "$migration"
            psql -h localhost -U synapse -d synapse -v ON_ERROR_STOP=1 -f "$migration"
          done < scripts/ci/critical_migrations.txt

      - name: Run pg_amcheck
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          PG_AMCHECK_REPORT: artifacts/db-amcheck-report.txt
        run: |
          mkdir -p artifacts
          python3 scripts/run_pg_amcheck.py

      - name: Upload pg_amcheck report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: db-amcheck-report
          path: artifacts/db-amcheck-report.txt
          retention-days: 14

  unified-vs-db-migrate-p0-alignment:
    name: Unified vs DB-Migrate P0 Alignment
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: synapse
          POSTGRES_PASSWORD: synapse
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install psycopg2-binary

      - name: Install PostgreSQL tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Prepare comparison databases
        env:
          PGPASSWORD: synapse
        run: |
          psql -h localhost -U synapse -d postgres -v ON_ERROR_STOP=1 -c "DROP DATABASE IF EXISTS synapse_expected;"
          psql -h localhost -U synapse -d postgres -v ON_ERROR_STOP=1 -c "DROP DATABASE IF EXISTS synapse_actual;"
          psql -h localhost -U synapse -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE synapse_expected;"
          psql -h localhost -U synapse -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE synapse_actual;"

      - name: Apply unified schema baseline and critical increments
        env:
          PGPASSWORD: synapse
        run: |
          psql -h localhost -U synapse -d synapse_expected -v ON_ERROR_STOP=1 -f migrations/00000000_unified_schema_v6.sql
          set -euo pipefail
          test -f scripts/ci/critical_migrations.txt
          while IFS= read -r migration; do
            [ -z "$migration" ] && continue
            test -f "$migration"
            psql -h localhost -U synapse -d synapse_expected -v ON_ERROR_STOP=1 -f "$migration"
          done < scripts/ci/critical_migrations.txt

      - name: Apply migration-managed schema through db_migrate.sh
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: synapse_actual
          DB_USER: synapse
          DB_PASSWORD: synapse
        run: bash docker/db_migrate.sh migrate

      - name: Extract expected and actual schemas
        run: |
          python3 scripts/db/extract_schema.py \
            --host localhost \
            --port 5432 \
            --database synapse_expected \
            --user synapse \
            --password synapse \
            --schema public \
            --output artifacts/expected_schema_db_migrate.json \
            --skip-row-counts
          python3 scripts/db/extract_schema.py \
            --host localhost \
            --port 5432 \
            --database synapse_actual \
            --user synapse \
            --password synapse \
            --schema public \
            --output artifacts/actual_schema_db_migrate.json \
            --skip-row-counts

      - name: Block on unified-vs-migrations P0 schema drift
        run: |
          python3 scripts/db/check_p0_schema_alignment.py \
            artifacts/expected_schema_db_migrate.json \
            artifacts/actual_schema_db_migrate.json \
            --text-report artifacts/p0_schema_alignment_db_migrate.txt \
            --markdown-report artifacts/p0_schema_alignment_db_migrate.md

      - name: Upload P0 schema alignment report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: p0-schema-alignment-db-migrate-report
          path: |
            artifacts/p0_schema_alignment_db_migrate.txt
            artifacts/p0_schema_alignment_db_migrate.md
          retention-days: 14

      - name: Upload expected/actual schemas (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: p0-schema-alignment-db-migrate-schemas
          path: |
            artifacts/expected_schema_db_migrate.json
            artifacts/actual_schema_db_migrate.json
          retention-days: 14

  sqlx-migrate-run:
    name: sqlx Migrate Run
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: synapse
          POSTGRES_PASSWORD: synapse
          POSTGRES_DB: synapse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: pip install psycopg2-binary

      - name: Install PostgreSQL tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --locked --no-default-features --features postgres

      - name: Build forward-only sqlx migration source
        run: python3 scripts/build_sqlx_migration_source.py artifacts/sqlx-migrations

      - name: Create database and run migrations
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
        run: |
          sqlx database create
          sqlx migrate run --source artifacts/sqlx-migrations

      - name: Create expected comparison database
        env:
          PGPASSWORD: synapse
        run: |
          psql -h localhost -U synapse -d postgres -v ON_ERROR_STOP=1 -c "DROP DATABASE IF EXISTS synapse_expected;"
          psql -h localhost -U synapse -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE synapse_expected;"

      - name: Apply unified schema baseline and critical increments to expected database
        env:
          PGPASSWORD: synapse
        run: |
          psql -h localhost -U synapse -d synapse_expected -v ON_ERROR_STOP=1 -f migrations/00000000_unified_schema_v6.sql
          set -euo pipefail
          test -f scripts/ci/critical_migrations.txt
          while IFS= read -r migration; do
            [ -z "$migration" ] && continue
            test -f "$migration"
            psql -h localhost -U synapse -d synapse_expected -v ON_ERROR_STOP=1 -f "$migration"
          done < scripts/ci/critical_migrations.txt

      - name: Extract actual and expected schemas
        run: |
          python3 scripts/db/extract_schema.py \
            --host localhost \
            --port 5432 \
            --database synapse \
            --user synapse \
            --password synapse \
            --schema public \
            --output artifacts/actual_schema.json \
            --skip-row-counts
          python3 scripts/db/extract_schema.py \
            --host localhost \
            --port 5432 \
            --database synapse_expected \
            --user synapse \
            --password synapse \
            --schema public \
            --output artifacts/expected_schema.json \
            --skip-row-counts

      - name: Block on unified-vs-migrations P0 schema drift
        run: |
          python3 scripts/db/check_p0_schema_alignment.py \
            artifacts/expected_schema.json \
            artifacts/actual_schema.json \
            --text-report artifacts/p0_schema_alignment.txt \
            --markdown-report artifacts/p0_schema_alignment.md

      - name: Run thread storage database smoke tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
        run: cargo test --locked --test unit thread_storage_tests -- --test-threads=1

      - name: Run retention storage database smoke tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
        run: cargo test --locked --test unit retention_storage_tests -- --test-threads=1

      - name: Run room summary storage database smoke tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
        run: cargo test --locked --test unit room_summary_storage_tests -- --test-threads=1

      - name: Run db schema smoke tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
        run: cargo test --locked --test unit db_schema_smoke_tests -- --test-threads=1

      - name: Run schema contract p0 tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
        run: cargo test --locked --test unit schema_contract_p0 -- --test-threads=1

      - name: Run room core schema contract integration tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          INTEGRATION_TESTS_REQUIRED: "1"
        run: cargo test --locked --test schema_contract_room_core_tests -- --test-threads=1

      - name: Run room summary schema contract integration tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          INTEGRATION_TESTS_REQUIRED: "1"
        run: cargo test --locked --test schema_contract_room_summary_tests -- --test-threads=1

      - name: Run space schema contract integration tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          INTEGRATION_TESTS_REQUIRED: "1"
        run: cargo test --locked --test schema_contract_space_tests -- --test-threads=1

      - name: Run account data schema contract integration tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          INTEGRATION_TESTS_REQUIRED: "1"
        run: cargo test --locked --test schema_contract_account_data_tests -- --test-threads=1

      - name: Run search schema contract integration tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          INTEGRATION_TESTS_REQUIRED: "1"
        run: cargo test --locked --test schema_contract_search_tests -- --test-threads=1

      - name: Run e2ee schema contract integration tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          INTEGRATION_TESTS_REQUIRED: "1"
        run: cargo test --locked --test schema_contract_e2ee_verification_tests -- --test-threads=1

      - name: Run thread schema contract integration tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          INTEGRATION_TESTS_REQUIRED: "1"
        run: cargo test --locked --test schema_contract_thread_tests -- --test-threads=1

      - name: Run retention schema contract integration tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          INTEGRATION_TESTS_REQUIRED: "1"
        run: cargo test --locked --test schema_contract_retention_tests -- --test-threads=1

      - name: Run invite restriction schema contract integration tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          INTEGRATION_TESTS_REQUIRED: "1"
        run: cargo test --locked --test schema_contract_invite_restrictions_tests -- --test-threads=1

      - name: Run auth token schema contract integration tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          INTEGRATION_TESTS_REQUIRED: "1"
        run: cargo test --locked --test schema_contract_auth_tokens_tests -- --test-threads=1

      - name: Run presence schema contract integration tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          INTEGRATION_TESTS_REQUIRED: "1"
        run: cargo test --locked --test schema_contract_presence_tests -- --test-threads=1

      - name: Run openid token schema contract integration tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          INTEGRATION_TESTS_REQUIRED: "1"
        run: cargo test --locked --test schema_contract_openid_token_tests -- --test-threads=1

      - name: Run media quota schema contract integration tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          INTEGRATION_TESTS_REQUIRED: "1"
        run: cargo test --locked --test schema_contract_media_quota_tests -- --test-threads=1

      - name: Run receipts schema contract integration tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          INTEGRATION_TESTS_REQUIRED: "1"
        run: cargo test --locked --test schema_contract_receipts_tests -- --test-threads=1

      - name: Run sync unread schema contract integration tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          INTEGRATION_TESTS_REQUIRED: "1"
        run: cargo test --locked --test schema_contract_sync_unread_tests -- --test-threads=1

      - name: Run receipts aggregation schema contract integration tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          INTEGRATION_TESTS_REQUIRED: "1"
        run: cargo test --locked --test schema_contract_receipts_aggregation_tests -- --test-threads=1

      - name: Run read markers handler schema contract integration tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          INTEGRATION_TESTS_REQUIRED: "1"
        run: cargo test --locked --test schema_contract_read_markers_handler_tests -- --test-threads=1

      - name: Run sync ephemeral receipts schema contract integration tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          INTEGRATION_TESTS_REQUIRED: "1"
        run: cargo test --locked --test schema_contract_sync_ephemeral_receipts_tests -- --test-threads=1

      - name: Run placeholder contract P1/P2 integration tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          INTEGRATION_TESTS_REQUIRED: "1"
        run: cargo test --locked --test integration api_placeholder_contract_p1p2_tests -- --test-threads=1 --nocapture

      - name: Run database integrity migration gates
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          INTEGRATION_TESTS_REQUIRED: "1"
        run: |
          set -euo pipefail
          tests=(
            "database_integrity_tests::tests::test_audit_critical_indexes_exist"
            "database_integrity_tests::tests::test_audit_critical_constraints_exist"
            "database_integrity_tests::tests::test_verification_requests_pending_index_survives_full_migration_chain"
            "database_integrity_tests::tests::test_public_schema_contract_repairs_apply_cleanly"
            "database_integrity_tests::tests::test_orphan_data_diagnostics_query_executes"
          )
          for test_name in "${tests[@]}"; do
            cargo test --locked --test integration "$test_name" -- --exact --nocapture
          done

      - name: Run invite blocklist database smoke tests
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
        run: cargo test --locked --test unit invite_blocklist_tests -- --test-threads=1

      - name: Generate logical checksum report
        env:
          DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
          LOGICAL_CHECKSUM_TABLES_FILE: scripts/logical_checksum_tables.txt
          LOGICAL_CHECKSUM_REPORT: artifacts/db-logical-checksum-report.json
        run: python3 scripts/generate_logical_checksum_report.py

      - name: Upload logical checksum report
        uses: actions/upload-artifact@v4
        with:
          name: db-logical-checksum-report
          path: artifacts/db-logical-checksum-report.json
          retention-days: 14

      - name: Upload P0 schema alignment report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: p0-schema-alignment-report
          path: |
            artifacts/p0_schema_alignment.txt
            artifacts/p0_schema_alignment.md
          retention-days: 14

      - name: Upload expected/actual schemas (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: p0-schema-alignment-schemas
          path: |
            artifacts/expected_schema.json
            artifacts/actual_schema.json
          retention-days: 14
