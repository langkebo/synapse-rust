name: Manual Coverage Validation

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse
  TEST_DATABASE_URL: postgresql://synapse:synapse@localhost:5432/synapse

jobs:
  test:
    name: Test and Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: synapse
          POSTGRES_PASSWORD: synapse
          POSTGRES_DB: synapse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust 1.93.0
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.93.0
        components: rustfmt, clippy

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Install sqlx-cli and cargo-tarpaulin
      run: |
        cargo install sqlx-cli --locked --no-default-features --features postgres
        cargo install cargo-tarpaulin --locked

    - name: Build forward-only sqlx migration source
      run: python3 scripts/build_sqlx_migration_source.py artifacts/sqlx-migrations

    - name: Run Migrations
      run: |
        sqlx migrate run --source artifacts/sqlx-migrations

    - name: Run Tests and Generate Coverage
      run: |
        # Tarpaulin flag rationale (see scripts/run_local_coverage.sh):
        #   --workspace           cover every crate in the workspace
        #   --all-features         compile every source-level feature so all .rs files
        #                         are visible to the instrumenter
        #   --features test-utils build integration/unit/e2e test binaries declared
        #                         with `required-features = ["test-utils"]`
        #   --include-tests        run integration test targets (tests/*) in addition
        #                         to lib/bin unit tests
        #   --fail-under is intentionally omitted (current floor is 70% via
        #   .tarpaulin.toml `range`; per-file thresholds enforced by
        #   scripts/check_file_coverage.py in ci.yml coverage job)
        cargo tarpaulin \
          --workspace \
          --all-features \
          --features test-utils \
          --include-tests \
          --out Lcov \
          --output-dir coverage/ \
          --locked

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: coverage/lcov.info
        fail_ci_if_error: true
