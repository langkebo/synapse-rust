# Tarpaulin coverage configuration
# See: https://crates.io/crates/cargo-tarpaulin

[default]
# Output format
out = ["Html", "Lcov", "Json"]

# Output directory
output-dir = "coverage"

# Coverage thresholds (v2 plan target: ≥80%)
# - Full coverage (lib + integration) ≥ 80%
fail-under = 80

# Exclude patterns
exclude-files = [
    "src/test_utils.rs",
    "tests/**",
    "benches/**",
]

# Features to enable
features = "test-utils"

# Run tests with limited threads to avoid DB connection pool exhaustion
args = ["--test-threads=2"]

# Skip doc tests (they're not part of coverage measurement)
skip-clean = false

# Generate HTML report with line-by-line coverage
[report]
# Color output
color = "Always"

# Show uncovered lines
verbose = true
