# Tarpaulin coverage configuration
# See: https://crates.io/crates/cargo-tarpaulin

[default]
# Output format
out = ["Html", "Lcov", "Json"]

# Output directory
output-dir = "coverage"

# B.3: hard floor 40% overall. Core 13 paths ≥70% enforced separately via
# scripts/check_file_coverage.py --core-files. Long-term 70% target for all
# paths enforced via per-file ratchet.
fail-under = 40

# Include only library code (exclude tests, examples, benches)
include-lines = ["src/**/*.rs"]

# Exclude patterns
exclude-files = [
    "src/test_utils.rs",
    "tests/**",
    "benches/**",
]

# Features to enable
features = "test-utils"

# B.3: raised from 2 -> 8 to match nextest profile (DB pool max=40).
args = ["--test-threads=8"]

# Skip doc tests (they're not part of coverage measurement)
skip-clean = false

# Generate HTML report with line-by-line coverage
[report]
# Color output
color = "Always"

# Show uncovered lines
verbose = true