# Tarpaulin coverage configuration
# See: https://crates.io/crates/cargo-tarpaulin

[default]
# Output format
out = ["Html", "Lcov", "Json"]

# Output directory
output-dir = "coverage"

# Coverage thresholds (Step 8 audit requirements)
# - lib ≥ 70%
# - P0 paths ≥ 90%
fail-under = 70

# Include only library code (exclude tests, examples, benches)
include-lines = ["src/**/*.rs"]

# Exclude patterns
exclude-files = [
    "src/test_utils.rs",
    "tests/**",
    "benches/**",
]

# Features to enable
features = "test-utils"

# Run tests with single thread to avoid DB connection pool exhaustion
args = ["--test-threads=2"]

# Skip doc tests (they're not part of coverage measurement)
skip-clean = false

# Generate HTML report with line-by-line coverage
[report]
# Color output
color = "Always"

# Show uncovered lines
verbose = true