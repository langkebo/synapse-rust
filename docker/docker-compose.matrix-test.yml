# docker-compose.matrix-test.yml
# Local dev stack for https://matrix.test (port 443)
#
# Usage:
#   cd docker
#   docker compose -f docker-compose.matrix-test.yml up -d

services:
  synapse-rust:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: synapse-rust:local
    container_name: synapse-rust
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      SYNAPSE_CONFIG_PATH: /app/config/homeserver.yaml
      RATE_LIMIT_CONFIG_PATH: /app/config/rate_limit.yaml
      DB_USER: ${DB_USER:-synapse}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      DB_NAME: ${DB_NAME:-synapse}
      DATABASE_URL: postgres://${DB_USER:-synapse}:${DB_PASSWORD:?DB_PASSWORD must be set}@db:5432/${DB_NAME:-synapse}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      TOKEN_HASH_SECRET: ${TOKEN_HASH_SECRET:?TOKEN_HASH_SECRET must be set}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - synapse_data:/app/data
      - synapse_logs:/app/logs
      - ./config/homeserver.yaml:/app/config/homeserver.yaml:ro
      - ./config/rate_limit.yaml:/app/config/rate_limit.yaml:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - synapse_net

  db:
    image: postgres:16
    container_name: synapse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-synapse}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_DB: ${DB_NAME:-synapse}
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-synapse} -d ${DB_NAME:-synapse}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - synapse_net

  redis:
    image: redis:7-alpine
    container_name: synapse-redis
    restart: unless-stopped
    command: >
      redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - synapse_net

  nginx:
    image: nginx:1.27-alpine
    container_name: synapse-nginx
    restart: unless-stopped
    depends_on:
      synapse-rust:
        condition: service_healthy
    networks:
      - synapse_net
    ports:
      - "80:80"
      - "443:443"
      - "8448:8448"
    volumes:
      - ./nginx/nginx-matrix-only.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl/matrix.test.crt:/etc/nginx/ssl/matrix.test.crt:ro
      - ./nginx/ssl/matrix.test.key:/etc/nginx/ssl/matrix.test.key:ro
      - ./nginx/friends:/usr/share/nginx/friends:ro
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- --no-check-certificate https://127.0.0.1/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  synapse_data:
  synapse_logs:
  nginx_logs:

networks:
  synapse_net:
    driver: bridge
