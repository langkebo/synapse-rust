services:
  synapse-rust:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    image: ${SYNAPSE_IMAGE:-synapse-rust}:${SYNAPSE_IMAGE_TAG:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-synapse}-rust
    restart: unless-stopped
    init: true
    cpus: ${SYNAPSE_CPU_LIMIT:-2.0}
    mem_limit: ${SYNAPSE_MEMORY_LIMIT:-2048m}
    pids_limit: ${SYNAPSE_PIDS_LIMIT:-512}
    env_file:
      - ./.env
    networks:
      - synapse_network
    ports:
      - "${SYNAPSE_PORT:-28008}:8008"
      - "${FEDERATION_PORT:-28448}:8448"
    environment:
      SYNAPSE_CONFIG_PATH: /app/config/homeserver.yaml
      RATE_LIMIT_CONFIG_PATH: /app/config/rate_limit.yaml
      DB_USER: ${DB_USER:-synapse}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      DB_NAME: ${DB_NAME:-synapse}
      DATABASE_URL: postgres://${DB_USER:-synapse}:${DB_PASSWORD:?DB_PASSWORD must be set}@db:5432/${DB_NAME:-synapse}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      VERIFY_SCHEMA: ${VERIFY_SCHEMA:-true}
      STOP_ON_MIGRATION_FAILURE: ${STOP_ON_MIGRATION_FAILURE:-true}
      DB_WAIT_ATTEMPTS: ${DB_WAIT_ATTEMPTS:-30}
      DB_WAIT_INTERVAL: ${DB_WAIT_INTERVAL:-2}
      MIGRATION_TIMEOUT: ${MIGRATION_TIMEOUT:-300}
      SYNAPSE_ENABLE_RUNTIME_DB_INIT: ${SYNAPSE_ENABLE_RUNTIME_DB_INIT:-false}
      SYNAPSE_SKIP_DB_INIT: "true"
      RUST_LOG: ${RUST_LOG:-info}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config/homeserver.yaml:/app/config/homeserver.yaml:ro
      - ./config/rate_limit.yaml:/app/config/rate_limit.yaml:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "/app/healthcheck" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
  db:
    image: postgres:${POSTGRES_VERSION:-16}
    container_name: ${COMPOSE_PROJECT_NAME:-synapse}-postgres
    restart: unless-stopped
    cpus: ${DB_CPU_LIMIT:-1.5}
    mem_limit: ${DB_MEMORY_LIMIT:-1536m}
    pids_limit: ${DB_PIDS_LIMIT:-256}
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${DB_USER:-synapse}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_DB: ${DB_NAME:-synapse}
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --lc-collate=C --lc-ctype=C
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres.conf:/etc/postgresql/postgresql.conf
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-synapse} -d ${DB_NAME:-synapse}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - synapse_network
    command: >
      postgres -c config_file=/etc/postgresql/postgresql.conf
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:${REDIS_VERSION:-7}-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-synapse}-redis
    restart: unless-stopped
    cpus: ${REDIS_CPU_LIMIT:-1.0}
    mem_limit: ${REDIS_MEMORY_LIMIT:-512m}
    pids_limit: ${REDIS_PIDS_LIMIT:-128}
    command: >
      redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set} --appendonly yes --maxmemory ${REDIS_MAX_MEMORY:-256mb} --maxmemory-policy ${REDIS_EVICTION_POLICY:-allkeys-lru} --save 60 1000 --save 300 100 --save 900 1
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:?REDIS_PASSWORD must be set}\" ping | grep PONG" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - synapse_network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
networks:
  synapse_network:
    driver: bridge
    name: ${COMPOSE_PROJECT_NAME:-synapse}_network
