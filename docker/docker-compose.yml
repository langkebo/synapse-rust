# ============================================================================
# Synapse Rust Docker Compose Configuration
# ============================================================================
# 用于本地开发和生产部署
#
# 使用方法:
#   首次部署:
#     cd docker
#     cp config/.env.example .env
#     docker compose up -d
#
#   日常运维:
#     docker compose up -d        # 启动
#     docker compose down          # 停止
#     docker compose logs -f       # 查看日志
#     docker compose restart       # 重启
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # Synapse Rust - Matrix Homeserver
  # --------------------------------------------------------------------------
  synapse-rust:
    image: synapse-rust:${IMAGE_TAG:-v3.0}
    build:
      context: ..
      dockerfile: docker/Dockerfile.binary
    container_name: ${COMPOSE_PROJECT_NAME:-synapse}-rust
    restart: unless-stopped
    networks:
      - synapse_network
    ports:
      - "${SYNAPSE_PORT:-8008}:8008"
      - "${FEDERATION_PORT:-8448}:8448"
    environment:
      # 基础配置
      - RUST_LOG=${RUST_LOG:-info}
      - TZ=${TZ:-Asia/Shanghai}

      # 服务器配置
      - SERVER_NAME=${SERVER_NAME:-cjystx.top}

      # 安全配置
      - SECRET_KEY=${SECRET_KEY:-e8f6e9a41bfb026417737b52359830aeacd8f54decb50af5697e97a13261f35d}
      - MACAROON_SECRET=${MACAROON_SECRET:-e8f6e9a41bfb026417737b52359830aeacd8f54decb50af5697e97a13261f35d}
      - FORM_SECRET=${FORM_SECRET:-e8f6e9a41bfb026417737b52359830aeacd8f54decb50af5697e97a13261f35d}
      - REGISTRATION_SECRET=${REGISTRATION_SECRET:-test_shared_secret}
      - ADMIN_SECRET=${ADMIN_SECRET:-admin_secret_key}

      # CORS 配置
      - CORS_ORIGIN_PATTERN=${CORS_ORIGIN_PATTERN:-.*}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}

      # 数据库配置
      - DATABASE_URL=postgres://${DB_USER:-synapse}:${DB_PASSWORD:-synapse}@${DB_HOST:-postgres}:${DB_PORT:-5432}/${DB_NAME:-synapse}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-20}
      - DB_MAX_SIZE=${DB_MAX_SIZE:-50}
      - DB_MIN_IDLE=${DB_MIN_IDLE:-5}
      - DB_CONNECTION_TIMEOUT=${DB_CONNECTION_TIMEOUT:-30}

      # Redis 配置
      - REDIS_URL=redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}
      - REDIS_KEY_PREFIX=${REDIS_KEY_PREFIX:-synapse:}
      - REDIS_POOL_SIZE=${REDIS_POOL_SIZE:-10}
      - REDIS_ENABLED=${REDIS_ENABLED:-true}

      # 迁移配置
      - RUN_MIGRATIONS=${RUN_MIGRATIONS:-true}
      - VERIFY_MIGRATIONS=${VERIFY_MIGRATIONS:-true}
      - DB_WAIT_ATTEMPTS=${DB_WAIT_ATTEMPTS:-30}
      - DB_WAIT_INTERVAL=${DB_WAIT_INTERVAL:-2}
      - STOP_ON_MIGRATION_FAILURE=${STOP_ON_MIGRATION_FAILURE:-false}

      # 日志配置
      - LOG_FORMAT=${LOG_FORMAT:-text}

    volumes:
      - synapse_data:/app/data
      - synapse_logs:/app/logs
      - ./config/homeserver.yaml:/app/config/homeserver.yaml:ro

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/_matrix/client/versions"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    security_opt:
      - no-new-privileges:true

    ulimits:
      nofile:
        soft: 65536
        hard: 65536

    deploy:
      resources:
        limits:
          memory: ${SYNAPSE_MEMORY_LIMIT:-2G}
        reservations:
          memory: ${SYNAPSE_MEMORY_RESERVATION:-512M}
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # --------------------------------------------------------------------------
  # PostgreSQL - Primary Database
  # --------------------------------------------------------------------------
  db:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-synapse}-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-synapse}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-synapse}
      - POSTGRES_DB=${DB_NAME:-synapse}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "${DB_EXPOSE_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-synapse} -d ${DB_NAME:-synapse}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - synapse_network
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEMORY_LIMIT:-1G}
        reservations:
          memory: ${POSTGRES_MEMORY_RESERVATION:-256M}
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB}
      -c effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-512MB}
      -c maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-64MB}
      -c work_mem=${POSTGRES_WORK_MEM:-16MB}
      -c max_connections=${POSTGRES_MAX_CONNECTIONS:-100}
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # --------------------------------------------------------------------------
  # Redis - Cache & Session Store
  # --------------------------------------------------------------------------
  redis:
    image: redis:${REDIS_VERSION:-7}-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-synapse}-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy ${REDIS_EVICTION_POLICY:-allkeys-lru}
      --save 60 1000
      --save 300 100
      --save 900 1
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_EXPOSE_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - synapse_network
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT:-512M}
        reservations:
          memory: ${REDIS_MEMORY_RESERVATION:-128M}
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

# --------------------------------------------------------------------------
# Volumes
# --------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  synapse_data:
    driver: local
  synapse_logs:
    driver: local

# --------------------------------------------------------------------------
# Networks
# --------------------------------------------------------------------------
networks:
  synapse_network:
    driver: bridge
    name: ${COMPOSE_PROJECT_NAME:-synapse}_network
