server:
  name: "${SERVER_NAME:?SERVER_NAME is required}"
  host: "0.0.0.0"
  port: 8008
  public_baseurl: "${PUBLIC_BASEURL:?PUBLIC_BASEURL is required}"
  signing_key_path: "/app/data/signing.key"
  macaroon_secret_key: "${MACAROON_SECRET:?MACAROON_SECRET is required}"
  form_secret: "${FORM_SECRET:?FORM_SECRET is required}"
  server_name: "${SERVER_NAME:?SERVER_NAME is required}"
  registration_shared_secret: "${REGISTRATION_SHARED_SECRET:?REGISTRATION_SHARED_SECRET is required}"
  max_upload_size: 104857600
  max_image_resolution: 16000000
  enable_registration: true
  enable_registration_captcha: false
  background_tasks_interval: 300
  expire_access_token: true
  expire_access_token_lifetime: 86400
  refresh_token_lifetime: 604800
  refresh_token_sliding_window_size: 3600
  session_duration: 86400000
  warmup_pool: true

database:
  host: "postgres"
  port: 5432
  username: "${POSTGRES_USER:-postgres}"
  password: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
  name: "${POSTGRES_DB:-synapse}"
  pool_size: 20
  max_size: 50
  min_idle: 10
  connection_timeout: 60

redis:
  host: "redis"
  port: 6379
  password: "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
  key_prefix: "${REDIS_KEY_PREFIX:-synapse:}"
  pool_size: 20
  enabled: true
  connection_timeout_ms: 5000
  command_timeout_ms: 3000

logging:
  level: "${RUST_LOG:-info}"
  format: "text"

search:
  enabled: false
  elasticsearch_url: "http://localhost:9200"

federation:
  enabled: true
  allow_ingress: true
  server_name: "${SERVER_NAME:?SERVER_NAME is required}"
  federation_port: 8448
  connection_pool_size: 64
  max_transaction_payload: 10485760
  suppress_key_server_warning: false
  signature_cache_ttl: 3600
  key_cache_ttl: 3600

security:
  secret: "${SECRET_KEY:?SECRET_KEY is required}"
  expiry_time: 86400
  refresh_token_expiry: 604800
  argon2_m_cost: 65536
  argon2_t_cost: 3
  argon2_p_cost: 4
  allow_legacy_hashes: false
  login_failure_lockout_threshold: 5
  login_lockout_duration_seconds: 300

registration:
  enabled: true
  enable_registration_captcha: false
  session_duration: 86400000

admin_registration:
  enabled: true
  shared_secret: "${ADMIN_SHARED_SECRET:?ADMIN_SHARED_SECRET is required}"
  nonce_timeout_seconds: 60
  allow_external_access: false
  production_only: true

cors:
  allowed_origins:
    - "http://localhost:8008"
    - "http://127.0.0.1:8008"
    - "http://localhost:6130"
    - "http://127.0.0.1:6130"
    - "http://localhost:28080"
    - "http://127.0.0.1:28080"
    - "https://localhost:28443"
    - "https://127.0.0.1:28443"
    - "tauri://localhost"
    - "https://tauri.localhost"
  allow_credentials: true
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Authorization"
    - "Content-Type"
    - "Accept"
    - "Origin"
    - "X-Requested-With"
  max_age_seconds: 3600

url_preview:
  enabled: false

push:
  enabled: false

retention:
  enabled: true
  default_policy:
    min_lifetime: 86400
    max_lifetime: 7776000
  allowed_lifetime_min: 86400
  allowed_lifetime_max: 7776000
  purge_jobs:
    - interval: 3600
      batch_size: 500
  lifecycle_cleanup_enabled: true
  lifecycle_cleanup_interval_secs: 900
  cleanup_batch_size: 500
  audit_retention_days: 30
  queue_retention_days: 7

telemetry:
  enabled: false
  service_name: "synapse-rust"
  service_version: "6.0.4"
  service_namespace: "matrix"
  trace_enabled: false
  metrics_enabled: true
  logs_enabled: false
  otlp_endpoint: "http://otel-collector:4317"
  otlp_headers: null
  sampling_ratio: 0.1
  batch_export: true
  export_timeout_seconds: 30
  max_queue_size: 2048
  max_export_batch_size: 512
  scheduled_delay_millis: 5000

prometheus:
  enabled: true
  port: 9090
  path: "/metrics"
  include_namespace: true

worker:
  enabled: false
  instance_name: "master"
