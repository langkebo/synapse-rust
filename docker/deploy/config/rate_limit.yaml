enabled: true
default:
  per_second: 20
  burst_size: 40
endpoints: []
ip_header_priority:
  - "x-forwarded-for"
  - "x-real-ip"
  - "forwarded"
include_headers: true
exempt_paths:
  - "/"
  - "/_matrix/client/versions"
  - "/_matrix/client/v3/versions"
exempt_path_prefixes: []
endpoint_aliases: {}
fail_open_on_error: true
sync:
  enabled: true
  initial:
    per_second: 2
    burst_size: 4
  incremental:
    per_second: 20
    burst_size: 40
