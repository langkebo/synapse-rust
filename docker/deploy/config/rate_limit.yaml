enabled: true
default:
  per_second: 50
  burst_size: 100
endpoints:
  - path: "/_matrix/client/v3/login"
    match_type: "prefix"
    rule:
      per_second: 3
      burst_size: 10
  - path: "/_matrix/client/r0/login"
    match_type: "prefix"
    rule:
      per_second: 3
      burst_size: 10
ip_header_priority:
  - "x-forwarded-for"
  - "x-real-ip"
  - "forwarded"
include_headers: true
exempt_paths:
  - "/"
  - "/_matrix/client/versions"
  - "/_matrix/client/v3/versions"
  - "/_matrix/client/r0/versions"
  - "/_matrix/federation/v1/version"
exempt_path_prefixes:
  []
endpoint_aliases: {}
fail_open_on_error: true
sync:
  enabled: false
  initial:
    per_second: 5
    burst_size: 10
  incremental:
    per_second: 50
    burst_size: 100
