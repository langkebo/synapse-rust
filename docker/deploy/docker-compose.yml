# =============================================================================
# synapse-rust Docker Compose 配置文件
# =============================================================================
# 使用方法:
#   1. 复制 .env.example 为 .env 并修改配置
#   2. 运行 ./deploy.sh 进行部署
# =============================================================================

services:
  # ===========================================================================
  # PostgreSQL 数据库
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: synapse-postgres
    restart: unless-stopped
    cpus: ${POSTGRES_CPU_LIMIT:-1.5}
    mem_limit: ${POSTGRES_MEMORY_LIMIT:-1536m}
    pids_limit: ${POSTGRES_PIDS_LIMIT:-256}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-synapse}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-synapse}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - synapse-network

  # ===========================================================================
  # Redis 缓存
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: synapse-redis
    restart: unless-stopped
    cpus: ${REDIS_CPU_LIMIT:-1.0}
    mem_limit: ${REDIS_MEMORY_LIMIT:-512m}
    pids_limit: ${REDIS_PIDS_LIMIT:-128}
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - synapse-network

  # ===========================================================================
  # 数据库迁移服务 (一次性运行)
  # ===========================================================================
  migrator:
    image: postgres:16-alpine
    container_name: synapse-migrator
    cpus: ${MIGRATOR_CPU_LIMIT:-1.0}
    mem_limit: ${MIGRATOR_MEMORY_LIMIT:-1024m}
    pids_limit: ${MIGRATOR_PIDS_LIMIT:-128}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      DB_NAME: ${POSTGRES_DB:-synapse}
    volumes:
      - ./migrations:/migrations:ro
      - ./scripts/container-migrate.sh:/scripts/container-migrate.sh:ro
    networks:
      - synapse-network
    command: [ "/bin/sh", "/scripts/container-migrate.sh", "migrate" ]
    restart: "no"

  # ===========================================================================
  # Synapse Rust 主应用
  # ===========================================================================
  synapse:
    image: synapse-rust:local
    pull_policy: never
    container_name: synapse-app
    restart: unless-stopped
    cpus: ${SYNAPSE_CPU_LIMIT:-2.0}
    mem_limit: ${SYNAPSE_MEMORY_LIMIT:-2048m}
    pids_limit: ${SYNAPSE_PIDS_LIMIT:-512}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 服务器配置
      SERVER_NAME: ${SERVER_NAME:-localhost}
      PUBLIC_BASEURL: ${PUBLIC_BASEURL:-http://localhost:8008}

      # 数据库配置
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-synapse}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-synapse}
      SYNAPSE__DATABASE__POOL_SIZE: ${SYNAPSE__DATABASE__POOL_SIZE:-20}
      SYNAPSE__DATABASE__MAX_SIZE: ${SYNAPSE__DATABASE__MAX_SIZE:-50}
      SYNAPSE__DATABASE__MIN_IDLE: ${SYNAPSE__DATABASE__MIN_IDLE:-10}
      SYNAPSE__DATABASE__CONNECTION_TIMEOUT: ${SYNAPSE__DATABASE__CONNECTION_TIMEOUT:-60}

      # Redis 配置
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379

      # 管理员配置
      ADMIN_SHARED_SECRET: ${ADMIN_SHARED_SECRET:?ADMIN_SHARED_SECRET must be set in .env}

      # 安全配置
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      REGISTRATION_SHARED_SECRET: ${REGISTRATION_SHARED_SECRET:?REGISTRATION_SHARED_SECRET must be set in .env}

      # 日志级别
      RUST_LOG: ${RUST_LOG:-info}

      # 监听端口
      LISTEN_PORT: ${SYNAPSE_PORT:-8008}

      # CORS 配置
      ALLOWED_ORIGINS: "http://localhost:8008,http://localhost:80,http://localhost:443,http://localhost:28008"
      CORS_ORIGIN_PATTERN: "http://localhost:*"

      # 媒体存储路径
      SYNAPSE_MEDIA_PATH: /app/data/media
    volumes:
      - synapse_data:/app/data
      - ./media:/app/data/media
      - ./config/homeserver.yaml:/app/config/homeserver.yaml:ro
    healthcheck:
      test: [ "CMD", "/app/healthcheck" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - synapse-network
    ports:
      - "${SYNAPSE_PORT:-8008}:8008"

  # ===========================================================================
  # Nginx 反向代理
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: synapse-nginx
    restart: unless-stopped
    cpus: ${NGINX_CPU_LIMIT:-0.5}
    mem_limit: ${NGINX_MEMORY_LIMIT:-256m}
    pids_limit: ${NGINX_PIDS_LIMIT:-128}
    depends_on:
      synapse:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${FEDERATION_PORT:-8448}:8448"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - synapse-network

# =============================================================================
# 网络配置
# =============================================================================
networks:
  synapse-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# =============================================================================
# 数据卷配置
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  synapse_data:
    driver: local
  synapse_media:
    driver: local
  nginx_logs:
    driver: local
