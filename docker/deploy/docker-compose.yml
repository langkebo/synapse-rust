# =============================================================================
# synapse-rust Docker Compose 配置文件
# =============================================================================
# 使用方法:
#   1. 复制 .env.example 为 .env 并修改配置
#   2. 运行 ./deploy.sh 进行部署
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: synapse-postgres
    restart: unless-stopped
    shm_size: 256m
    cpus: ${POSTGRES_CPU_LIMIT:-1.5}
    mem_limit: ${POSTGRES_MEMORY_LIMIT:-1536m}
    pids_limit: ${POSTGRES_PIDS_LIMIT:-256}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-synapse}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:---encoding=UTF-8 --lc-collate=C --lc-ctype=C}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: ${TZ:-UTC}
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql:ro
      - ./config/postgres.conf:/etc/postgresql/postgresql.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-synapse}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - synapse-network

  redis:
    image: redis:7-alpine
    container_name: synapse-redis
    restart: unless-stopped
    cpus: ${REDIS_CPU_LIMIT:-1.0}
    mem_limit: ${REDIS_MEMORY_LIMIT:-512m}
    pids_limit: ${REDIS_PIDS_LIMIT:-128}
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - --appendonly
      - "yes"
      - --maxmemory
      - ${REDIS_MAX_MEMORY:-256mb}
      - --maxmemory-policy
      - ${REDIS_EVICTION_POLICY:-allkeys-lru}
      - --save
      - "60"
      - "1000"
      - --save
      - "300"
      - "100"
      - --save
      - "900"
      - "1"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:?REDIS_PASSWORD must be set}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - synapse-network

  migrator:
    image: postgres:16-alpine
    container_name: synapse-migrator
    restart: "no"
    cpus: ${MIGRATOR_CPU_LIMIT:-1.0}
    mem_limit: ${MIGRATOR_MEMORY_LIMIT:-1024m}
    pids_limit: ${MIGRATOR_PIDS_LIMIT:-128}
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      DB_NAME: ${POSTGRES_DB:-synapse}
      ENABLED_EXTENSIONS: ${ENABLED_EXTENSIONS:-all}
    entrypoint:
      - /bin/sh
      - -ec
    command: /scripts/container-migrate.sh migrate && /scripts/container-migrate.sh validate
    volumes:
      - ./migrations:/migrations:ro
      - ./scripts/container-migrate.sh:/scripts/container-migrate.sh:ro
      - ./logs:/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - synapse-network

  synapse:
    image: ${SYNAPSE_IMAGE:-synapse-rust:local}
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: runtime
    pull_policy: ${SYNAPSE_PULL_POLICY:-never}
    platform: linux/amd64
    container_name: synapse-app
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp
    cpus: ${SYNAPSE_CPU_LIMIT:-2.0}
    mem_limit: ${SYNAPSE_MEMORY_LIMIT:-2048m}
    pids_limit: ${SYNAPSE_PIDS_LIMIT:-512}
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SYNAPSE_CONFIG_PATH: /app/config/homeserver.yaml
      RATE_LIMIT_CONFIG_PATH: /app/config/rate_limit.yaml
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-synapse}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      SERVER_NAME: ${SERVER_NAME:?SERVER_NAME must be set}
      PUBLIC_BASEURL: ${PUBLIC_BASEURL:?PUBLIC_BASEURL must be set}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-synapse}
      ADMIN_SECRET: ${ADMIN_SHARED_SECRET:?ADMIN_SHARED_SECRET must be set}
      ADMIN_SHARED_SECRET: ${ADMIN_SHARED_SECRET:?ADMIN_SHARED_SECRET must be set}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      REGISTRATION_SHARED_SECRET: ${REGISTRATION_SHARED_SECRET:?REGISTRATION_SHARED_SECRET must be set}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      MACAROON_SECRET: ${MACAROON_SECRET:?MACAROON_SECRET must be set}
      FORM_SECRET: ${FORM_SECRET:?FORM_SECRET must be set}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:28008,http://127.0.0.1:28008,http://localhost:6130,http://127.0.0.1:6130,http://localhost:28080,http://127.0.0.1:28080,https://localhost:28443,https://127.0.0.1:28443,tauri://localhost,https://tauri.localhost}
      CORS_ORIGIN_PATTERN: ${CORS_ORIGIN_PATTERN:-^https?://(localhost|127\\.0\\.0\\.1)(:[0-9]+)?$}
      SYNAPSE__DATABASE__POOL_SIZE: ${SYNAPSE__DATABASE__POOL_SIZE:-20}
      SYNAPSE__DATABASE__MAX_SIZE: ${SYNAPSE__DATABASE__MAX_SIZE:-50}
      SYNAPSE__DATABASE__MIN_IDLE: ${SYNAPSE__DATABASE__MIN_IDLE:-10}
      SYNAPSE__DATABASE__CONNECTION_TIMEOUT: ${SYNAPSE__DATABASE__CONNECTION_TIMEOUT:-60}
      RUST_LOG: ${RUST_LOG:-info}
      TZ: ${TZ:-UTC}
      SYNAPSE_MEDIA_PATH: /app/data/media
    volumes:
      - synapse_data:/app/data
      - ./media:/app/data/media
      - ./config/homeserver.yaml:/app/config/homeserver.yaml:ro
      - ./config/rate_limit.yaml:/app/config/rate_limit.yaml:ro
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${SYNAPSE_PORT:-8008}:28008"
      - "${PROMETHEUS_PORT:-9090}:9090"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - synapse-network

  nginx:
    image: nginx:1.27-alpine
    container_name: synapse-nginx
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    cpus: ${NGINX_CPU_LIMIT:-0.5}
    mem_limit: ${NGINX_MEMORY_LIMIT:-256m}
    pids_limit: ${NGINX_PIDS_LIMIT:-128}
    depends_on:
      synapse:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${FEDERATION_PORT:-8448}:8448"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - synapse-network

networks:
  synapse-network:
    driver: bridge
    name: ${COMPOSE_PROJECT_NAME:-synapse}_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  synapse_data:
    driver: local
  nginx_logs:
    driver: local
