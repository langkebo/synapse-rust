# ============================================================================
# Synapse Rust - Database Services Only
# ============================================================================
# 只启动 PostgreSQL 和 Redis，不包含 synapse-rust
# synapse-rust 需要在 macOS 本地运行
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # PostgreSQL - Primary Database
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    container_name: synapse-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-synapse}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-synapse}
      - POSTGRES_DB=${DB_NAME:-synapse}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "${DB_EXPOSE_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-synapse} -d ${DB_NAME:-synapse}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - synapse_network
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEMORY_LIMIT:-1G}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # --------------------------------------------------------------------------
  # Redis - Cache & Session Store
  # --------------------------------------------------------------------------
  redis:
    image: redis:${REDIS_VERSION:-7}-alpine
    container_name: synapse-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy ${REDIS_EVICTION_POLICY:-allkeys-lru}
      --save 60 1000
      --save 300 100
      --save 900 1
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_EXPOSE_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - synapse_network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

# --------------------------------------------------------------------------
# Volumes
# --------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# --------------------------------------------------------------------------
# Networks
# --------------------------------------------------------------------------
networks:
  synapse_network:
    driver: bridge
