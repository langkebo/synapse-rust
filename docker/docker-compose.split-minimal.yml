services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-16}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-synapse}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_DB: ${DB_NAME:-synapse}
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --lc-collate=C --lc-ctype=C
      TZ: ${TZ:-UTC}
    volumes:
      - split_minimal_postgres_data:/var/lib/postgresql/data
      - ./config/postgres.conf:/etc/postgresql/postgresql.conf:ro
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c autovacuum=off
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-synapse} -d ${DB_NAME:-synapse}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - split_minimal_network

  redis:
    image: redis:${REDIS_VERSION:-7}-alpine
    restart: unless-stopped
    command: >
      redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set} --appendonly yes --maxmemory ${REDIS_MAX_MEMORY:-256mb} --maxmemory-policy ${REDIS_EVICTION_POLICY:-allkeys-lru}
    volumes:
      - split_minimal_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:?REDIS_PASSWORD must be set}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - split_minimal_network

  migrator:
    image: postgres:${POSTGRES_VERSION:-16}
    restart: "no"
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-synapse}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      DB_NAME: ${DB_NAME:-synapse}
    entrypoint:
      - /bin/sh
      - -ec
    command: |
      /scripts/container-migrate.sh migrate
      /scripts/container-migrate.sh validate
    volumes:
      - ./../migrations:/migrations:ro
      - ./deploy/scripts/container-migrate.sh:/scripts/container-migrate.sh:ro
    networks:
      - split_minimal_network

  master: &split_minimal_synapse
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: tools
      args:
        CARGO_FEATURE_ARGS: ${DOCKER_CARGO_FEATURE_ARGS:---features server,core-private-chat,openclaw,voice-extended,cas-sso,saml-sso,widgets --no-default-features}
        CARGO_BUILD_JOBS: ${DOCKER_CARGO_BUILD_JOBS:-2}
    image: ${SYNAPSE_IMAGE:-synapse-rust}:${SYNAPSE_IMAGE_TAG:-latest}
    restart: unless-stopped
    mem_limit: ${SPLIT_MINIMAL_WORKER_MEM_LIMIT:-256m}
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment: &split_minimal_synapse_env
      SYNAPSE_CONFIG_PATH: /app/config/homeserver.split-minimal.yaml
      RATE_LIMIT_CONFIG_PATH: /app/config/rate_limit.yaml
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-synapse}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      DB_NAME: ${DB_NAME:-synapse}
      DATABASE_URL: postgres://${DB_USER:-synapse}:${DB_PASSWORD:?DB_PASSWORD must be set}@postgres:5432/${DB_NAME:-synapse}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      SERVER_NAME: ${SERVER_NAME:-localhost}
      PUBLIC_BASEURL: ${PUBLIC_BASEURL:-http://localhost:28008}
      REGISTRATION_SECRET: ${REGISTRATION_SECRET:?REGISTRATION_SECRET must be set}
      ADMIN_SECRET: ${ADMIN_SECRET:?ADMIN_SECRET must be set}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      MACAROON_SECRET: ${MACAROON_SECRET:?MACAROON_SECRET must be set}
      FORM_SECRET: ${FORM_SECRET:?FORM_SECRET must be set}
      FEDERATION_SIGNING_KEY: ${FEDERATION_SIGNING_KEY:?FEDERATION_SIGNING_KEY must be set}
      FEDERATION_KEY_ID: ${FEDERATION_KEY_ID:-ed25519:local}
      WORKER_REPLICATION_SECRET: ${WORKER_REPLICATION_SECRET:?WORKER_REPLICATION_SECRET must be set}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-http://otel-collector:4317}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-synapse:}
      RUN_MIGRATIONS: "false"
      VERIFY_SCHEMA: "false"
      SYNAPSE_ENABLE_RUNTIME_DB_INIT: "false"
      SYNAPSE_SKIP_SCHEMA_CHECK: ${SYNAPSE_SKIP_SCHEMA_CHECK:-true}
      SYNAPSE_HEALTHCHECK_HOST: "0.0.0.0"
      SYNAPSE_HEALTHCHECK_TCP_ONLY: "true"
      SYNAPSE_ENABLE_BURN_AFTER_READ_PROCESSOR: "false"
      SYNAPSE_ENABLE_GLOBAL_MAINTENANCE_TASKS: "false"
      SYNAPSE__SERVER__WARMUP_POOL: "false"
      SYNAPSE__DATABASE__POOL_SIZE: "2"
      SYNAPSE__DATABASE__MAX_SIZE: "2"
      SYNAPSE__DATABASE__MIN_IDLE: "0"
      SYNAPSE__REDIS__POOL_SIZE: "4"
      SYNAPSE__SECURITY__ARGON2_M_COST: "32768"
      SYNAPSE__SECURITY__ARGON2_T_COST: "1"
      SYNAPSE__SECURITY__ARGON2_P_COST: "1"
      SYNAPSE_PASSWORD_HASH_POOL_MAX_CONCURRENT: "1"
      SYNAPSE_PASSWORD_HASH_POOL_THREAD_POOL_SIZE: "1"
      MALLOC_ARENA_MAX: "2"
      TOKIO_WORKER_THREADS: "1"
      RUST_LOG: ${RUST_LOG:-info}
      TZ: ${TZ:-UTC}
      WORKER_INSTANCE_NAME: master
    volumes:
      - split_minimal_shared_data:/app/data
      - ./config/homeserver.split-minimal.yaml:/app/config/homeserver.split-minimal.yaml:ro
      - ./config/rate_limit.yaml:/app/config/rate_limit.yaml:ro
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 60s
    networks:
      - split_minimal_network
    ports:
      - "${SPLIT_MINIMAL_MASTER_ADMIN_PORT:-18008}:8008"

  client-reader-1:
    <<: *split_minimal_synapse
    ports: []
    environment:
      <<: *split_minimal_synapse_env
      WORKER_INSTANCE_NAME: client_reader-1

  sync-worker:
    <<: *split_minimal_synapse
    ports: []
    environment:
      <<: *split_minimal_synapse_env
      WORKER_INSTANCE_NAME: sync_worker

  event-persister:
    <<: *split_minimal_synapse
    ports: []
    environment:
      <<: *split_minimal_synapse_env
      WORKER_INSTANCE_NAME: event_persister

  federation-reader:
    <<: *split_minimal_synapse
    mem_limit: ${SPLIT_MINIMAL_WORKER_MEM_LIMIT_HEAVY:-384m}
    ports: []
    environment:
      <<: *split_minimal_synapse_env
      WORKER_INSTANCE_NAME: federation_reader

  federation-sender:
    <<: *split_minimal_synapse
    ports: []
    environment:
      <<: *split_minimal_synapse_env
      WORKER_INSTANCE_NAME: federation_sender

  media-repository:
    <<: *split_minimal_synapse
    ports: []
    environment:
      <<: *split_minimal_synapse_env
      WORKER_INSTANCE_NAME: media_repository

  background-worker:
    <<: *split_minimal_synapse
    mem_limit: ${SPLIT_MINIMAL_WORKER_MEM_LIMIT_HEAVY:-384m}
    ports: []
    environment:
      <<: *split_minimal_synapse_env
      WORKER_INSTANCE_NAME: background_worker

  pusher:
    <<: *split_minimal_synapse
    ports: []
    environment:
      <<: *split_minimal_synapse_env
      WORKER_INSTANCE_NAME: pusher

  split_minimal_nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      client-reader-1:
        condition: service_started
      sync-worker:
        condition: service_started
      media-repository:
        condition: service_started
      federation-reader:
        condition: service_started
    ports:
      - "${SPLIT_MINIMAL_CLIENT_PORT:-28008}:80"
      - "${SPLIT_MINIMAL_FEDERATION_PORT:-28448}:8448"
    volumes:
      - ./nginx/split-minimal.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - split_minimal_network

networks:
  split_minimal_network:
    driver: bridge

volumes:
  split_minimal_postgres_data:
  split_minimal_redis_data:
  split_minimal_shared_data:
