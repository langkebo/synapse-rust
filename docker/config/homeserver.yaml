# ============================================================================
# Synapse Rust Homeserver Configuration
# ============================================================================

server:
  name: "cjystx.top"
  host: "0.0.0.0"
  port: 8008
  public_baseurl: "https://cjystx.top:8443"
  signing_key_path: "/app/data/signing.key"
  server_name: "cjystx.top"
  max_upload_size: 10485760
  max_image_resolution: 8000000
  enable_registration: true
  enable_registration_captcha: false
  background_tasks_interval: 300
  expire_access_token: false
  expire_access_token_lifetime: 86400
  refresh_token_lifetime: 604800
  refresh_token_sliding_window_size: 3600
  session_duration: 86400000
  warmup_pool: true

rate_limit:
  enabled: false
  default:
    per_second: 0
    burst_size: 0
  endpoints: []
  exempt_paths:
    - "/"
    - "/_matrix/client/versions"
  fail_open_on_error: true

database:
  host: "db"
  port: 5432
  username: "synapse"
  password: "ypSgEf1Y8YzivoBsRFnHvH4JLwn2nspX"
  name: "synapse"
  pool_size: 20
  max_size: 50
  min_idle: 10
  connection_timeout: 60

redis:
  host: "redis"
  port: 6379
  key_prefix: "synapse:"
  pool_size: 20
  enabled: true
  connection_timeout_ms: 5000
  command_timeout_ms: 3000

logging:
  level: "info"
  format: "text"

search:
  enabled: false
  elasticsearch_url: "http://localhost:9200"

federation:
  enabled: true
  allow_ingress: true
  server_name: "cjystx.top"
  federation_port: 8448
  connection_pool_size: 100
  max_transaction_payload: 10485760
  signing_key_path: "/app/data/keys/signing.key"
  key_id: "ed25519:testkb1OUw"

security:
  secret: "758ce19bd0f21445b48c6172c18aa38b6595b39f12462b7f3c23674a3057e655"
  expiry_time: 86400
  refresh_token_expiry: 604800
  argon2_m_cost: 65536
  argon2_t_cost: 3
  argon2_p_cost: 4
  allow_legacy_hashes: false
  login_failure_lockout_threshold: 5
  login_lockout_duration_seconds: 300

registration:
  enabled: true
  enable_registration_captcha: false
  session_duration: 86400000

admin_registration:
  enabled: true
  shared_secret: "change-me-admin-registration-secret"
  nonce_timeout_seconds: 60

worker:
  enabled: false

cors:
  allowed_origins:
    - "*"
  allow_credentials: true
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "*"
  max_age_seconds: 3600

identity_server_url: "https://vector.im"

voip:
  enabled: true
  stun_uris:
    - "stun:stun.l.google.com:19302"

url_preview:
  enabled: false

push:
  enabled: false

retention:
  enabled: true
  default_policy:
    min_lifetime: 1
    max_lifetime: 90

telemetry:
  enabled: false
  service_name: "synapse-rust"
  service_version: "6.0.4"
  service_namespace: "matrix"
  trace_enabled: false
  metrics_enabled: false
  logs_enabled: false
  otlp_endpoint: null
  otlp_headers: null
  sampling_ratio: 1.0
  batch_export: true
  export_timeout_seconds: 30
  max_queue_size: 2048
  max_export_batch_size: 512
  scheduled_delay_millis: 5000
  resource_attributes: null

prometheus:
  enabled: false
  port: 9090
  path: "/metrics"
  include_namespace: true

app_service:
  enabled: true
  appservice:
    - id: "openclaw"
      url: "http://host.docker.internal:8080"
      as_token: "openclaw_as_token_change_this"
      hs_token: "openclaw_hs_token_change_this"
      sender_localpart: "openclaw"
      rate_limited: false
      protocols:
        - "openclaw"
      namespaces:
        users:
          - exclusive: true
            regex: "@openclaw_.*:cjystx.top"
        rooms:
          - exclusive: false
            regex: "!openclaw_.*:cjystx.top"
        aliases:
          - exclusive: false
            regex: "#openclaw_.*:cjystx.top"
