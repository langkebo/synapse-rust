enabled: true
default:
  per_second: 50
  burst_size: 100
endpoints: []
ip_header_priority:
  - "x-forwarded-for"
  - "x-real-ip"
  - "forwarded"
include_headers: true
exempt_paths:
  - "/"
  - "/_matrix/client/versions"
  - "/_matrix/client/v3/versions"
  - "/_matrix/client/r0/versions"
  - "/_matrix/federation/v1/version"
exempt_path_prefixes:
  - "/_matrix/client/"
endpoint_aliases: {}
fail_open_on_error: true
sync:
  # Sliding sync performs long-polling and bursty catch-up after login. Disabling
  # the dedicated sync limiter avoids false-positive 429s during local use of
  # https://matrix.test while keeping the general limiter enabled elsewhere.
  enabled: false
  initial:
    per_second: 5
    burst_size: 10
  incremental:
    per_second: 50
    burst_size: 100
