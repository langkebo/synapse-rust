enabled: true
default:
  per_second: 50
  burst_size: 100
endpoints:
  - path: "/_matrix/client/versions"
    rule:
      per_second: 10
      burst_size: 30
  - path: "/.well-known/matrix/client"
    rule:
      per_second: 10
      burst_size: 30
  - path: "/.well-known/matrix/server"
    rule:
      per_second: 10
      burst_size: 30
  - path: "/health"
    rule:
      per_second: 10
      burst_size: 30
  - path: "/_matrix/client/v3/login"
    match_type: "prefix"
    rule:
      per_second: 5
      burst_size: 20
  - path: "/_matrix/client/r0/login"
    match_type: "prefix"
    rule:
      per_second: 5
      burst_size: 20
  - path: "/_matrix/client/v3/register"
    match_type: "prefix"
    rule:
      per_second: 1
      burst_size: 3
  - path: "/_matrix/client/v3/account/password"
    match_type: "prefix"
    rule:
      per_second: 1
      burst_size: 3
  - path: "/_matrix/client/v3/register/email/requestToken"
    match_type: "prefix"
    rule:
      per_second: 1
      burst_size: 3
  - path: "/_matrix/client/v3/refresh"
    match_type: "prefix"
    rule:
      per_second: 2
      burst_size: 5
  - path: "/_matrix/client/v3/keys/upload"
    match_type: "prefix"
    rule:
      per_second: 5
      burst_size: 10
ip_header_priority:
  - "x-forwarded-for"
  - "x-real-ip"
  - "forwarded"
include_headers: true
exempt_paths:
  - "/"
exempt_path_prefixes:
  - "/_matrix/client/v3/sync"
  - "/_matrix/client/r0/sync"
  - "/_matrix/client/v3/events"
  - "/_matrix/client/r0/events"
endpoint_aliases: {}
fail_open_on_error: true
sync:
  # Sliding sync performs long-polling and bursty catch-up after login. Disabling
  # the dedicated sync limiter avoids false-positive 429s during local use of
  # https://matrix.test while keeping the general limiter enabled elsewhere.
  enabled: false
  initial:
    per_second: 5
    burst_size: 10
  incremental:
    per_second: 50
    burst_size: 100
