# ============================================================================
# Synapse Rust Docker Compose - Local Development Configuration
# ============================================================================
# 使用方法:
#   cd docker
#   docker compose -f docker-compose.local.yml up -d
#
# 包含:
#   - PostgreSQL (端口 55432)
#   - Redis (端口 6379)
#   - Synapse Rust (端口 8008, 9090)
#   - Nginx (端口 80, 443, 8448)
# ============================================================================

services:
  # ==========================================================================
  # PostgreSQL - Local Development Database
  # ==========================================================================
  db:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-synapse}-postgres-local
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-synapse}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-synapse}
      - POSTGRES_DB=${DB_NAME:-synapse}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    ports:
      - "${DB_EXPOSE_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-synapse} -d ${DB_NAME:-synapse}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - synapse_local_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================================================
  # Redis - Local Cache
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-synapse}-redis-local
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --tcp-backlog 511
    volumes:
      - redis_local_data:/data
    ports:
      - "${REDIS_EXPOSE_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - synapse_local_network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ==========================================================================
  # Synapse Rust - Local Development Server
  # ==========================================================================
  synapse-rust:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        SERVER_NAME: ${SERVER_NAME:-cjystx.top}
        RUST_VERSION: ${RUST_VERSION:-1.88}
    image: synapse-rust:${IMAGE_TAG:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-synapse}-rust-local
    restart: unless-stopped
    ports:
      - "${SYNAPSE_PORT:-8008}:8008"
      - "${FEDERATION_PORT:-8448}:8448"
      - "${METRICS_PORT:-9090}:9090"
    environment:
      # 基础配置
      - RUST_LOG=${RUST_LOG:-debug}
      - RUST_BACKTRACE=${RUST_BACKTRACE:-1}
      - TZ=${TZ:-Asia/Shanghai}
      
      # 服务器配置
      - SERVER_NAME=${SERVER_NAME:-cjystx.top}
      - SYNAPSE_CONFIG_PATH=/app/config/homeserver.yaml
      
      # CORS 配置 (开发环境允许所有)
      - CORS_ORIGIN_PATTERN=${CORS_ORIGIN_PATTERN:-.*}
      
      # 数据库配置
      - DATABASE_URL=postgres://${DB_USER:-synapse}:${DB_PASSWORD:-synapse}@db:${DB_PORT:-5432}/${DB_NAME:-synapse}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-10}
      - DB_MAX_SIZE=${DB_MAX_SIZE:-20}
      - DB_MIN_IDLE=${DB_MIN_IDLE:-2}
      
      # Redis 配置
      - REDIS_URL=redis://redis:${REDIS_PORT:-6379}
      - REDIS_ENABLED=${REDIS_ENABLED:-true}
      
      # 迁移配置
      - RUN_MIGRATIONS=${RUN_MIGRATIONS:-true}
      - VERIFY_SCHEMA=${VERIFY_SCHEMA:-true}
      - MIGRATION_TIMEOUT=${MIGRATION_TIMEOUT:-300}
    volumes:
      - synapse_data:/app/data
      - synapse_logs:/app/logs
      - ./config/homeserver.yaml:/app/config/homeserver.yaml:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8008/_matrix/federation/v1/version"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - synapse_local_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================================================
  # Nginx - Reverse Proxy (可选)
  # ==========================================================================
  nginx:
    image: nginx:alpine
    container_name: ${COMPOSE_PROJECT_NAME:-synapse}-nginx-local
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${NGINX_FEDERATION_PORT:-8449}:8448"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./nginx/.well-known:/var/www/.well-known:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - synapse-rust
    networks:
      - synapse_local_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_local_data:
    driver: local
  redis_local_data:
    driver: local
  synapse_data:
    driver: local
  synapse_logs:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  synapse_local_network:
    driver: bridge
    name: ${COMPOSE_PROJECT_NAME:-synapse}_local_network
