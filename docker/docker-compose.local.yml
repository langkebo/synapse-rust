services:
  db:
    image: postgres:16-alpine
    container_name: synapse-postgres-local
    restart: unless-stopped
    environment:
      - POSTGRES_USER=synapse
      - POSTGRES_PASSWORD=synapse
      - POSTGRES_DB=synapse_test
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse -d synapse_test"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    networks:
      - synapse_local_network

  redis:
    image: redis:7-alpine
    container_name: synapse-redis-local
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_local_data:/data
    networks:
      - synapse_local_network

  synapse-rust:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: synapse-rust:latest
    container_name: synapse-rust-local
    restart: unless-stopped
    ports:
      - "8008:8008"
      - "9090:9090"
    environment:
      - RUST_LOG=debug
      - RUST_BACKTRACE=1
      - RUST_ENV=development
      - SERVER_NAME=cjystx.top
      - TZ=Asia/Shanghai
      - DATABASE_URL=postgres://synapse:synapse@db:5432/synapse_test
      - REDIS_URL=redis://redis:6379
      - RUN_MIGRATIONS=true
      - ALLOWED_ORIGINS=*
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8008/_matrix/federation/v1/version"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - synapse_local_network

  nginx:
    image: nginx:alpine
    container_name: synapse-nginx-local
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8448:8448"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./nginx/.well-known:/var/www/.well-known:ro
    depends_on:
      - synapse-rust
    networks:
      - synapse_local_network

volumes:
  postgres_local_data:
  redis_local_data:

networks:
  synapse_local_network:
    driver: bridge
