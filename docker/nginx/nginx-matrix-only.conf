events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    client_max_body_size 50G;

    upstream synapse_client {
        server synapse-rust:8008;
        keepalive 64;
    }

    server {
        listen 80;
        server_name matrix.test;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name matrix.test;

        ssl_certificate     /etc/nginx/ssl/matrix.test.crt;
        ssl_certificate_key /etc/nginx/ssl/matrix.test.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # .well-known
        location /.well-known/matrix/client {
            default_type application/json;
            return 200 '{"m.homeserver":{"base_url":"https://matrix.test"}}';
        }

        location /.well-known/matrix/server {
            default_type application/json;
            return 200 '{"m.server":"matrix.test:443"}';
        }

        location / {
            proxy_pass http://synapse_client;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;

            proxy_read_timeout 600s;
            proxy_connect_timeout 60s;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
