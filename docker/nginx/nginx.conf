# ============================================================================
# Synapse Rust + Element Web — local-dev TLS (mkcert)
# ============================================================================
# Hosts:
#   matrix.test   -> homeserver (client API + federation + .well-known)
#   element.test  -> Element Web client (statics)
#
# Add to /etc/hosts on the host machine:
#   127.0.0.1 matrix.test element.test
#
# Certs are issued via mkcert; keep matrix.test.crt / matrix.test.key in
# docker/nginx/ssl/ (mounted RO into the container).
# ============================================================================

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    client_max_body_size 50G;

    # — Rate limiting zones —————————————————————————————————————————————
    limit_req_zone $binary_remote_addr zone=matrix_api:10m rate=600r/m;
    limit_req_zone $binary_remote_addr zone=matrix_login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=matrix_register:10m rate=3r/m;
    limit_req_zone $binary_remote_addr zone=matrix_captcha:10m rate=2r/m;

    upstream synapse_client {
        server synapse-rust:8008;
        keepalive 64;
    }

    upstream element_web {
        server element-web:80;
        keepalive 32;
    }

    # ------------------------------------------------------------------------
    # HTTP -> HTTPS redirect (no ACME challenge needed for local mkcert).
    # ------------------------------------------------------------------------
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name matrix.test element.test;
        return 301 https://$host$request_uri;
    }

    # ------------------------------------------------------------------------
    # matrix.test — Matrix homeserver, federation, well-known discovery
    # ------------------------------------------------------------------------
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        listen 8448 ssl;
        listen [::]:8448 ssl;
        http2 on;
        server_name matrix.test;

        ssl_certificate     /etc/nginx/ssl/matrix.test.crt;
        ssl_certificate_key /etc/nginx/ssl/matrix.test.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: mxc:; media-src 'self' mxc:; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

        # .well-known/matrix discovery (served directly by nginx).
        location /.well-known/matrix/server {
            default_type application/json;
            add_header Access-Control-Allow-Origin "*";
            return 200 '{"m.server":"matrix.test:443"}';
        }
        location /.well-known/matrix/client {
            default_type application/json;
            add_header Access-Control-Allow-Origin "*";
            return 200 '{"m.homeserver":{"base_url":"https://matrix.test"}}';
        }
        location /.well-known/matrix/support {
            default_type application/json;
            add_header Access-Control-Allow-Origin "*";
            return 200 '{"contacts":[{"matrix_id":"@admin:matrix.test","role":"m.admin"}]}';
        }

        # Keep JWKS as a local fallback, but let OpenID discovery come from the
        # homeserver so nginx does not mask newer server-side capability work.
        location = /.well-known/jwks.json {
            default_type application/json;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            return 200 '{"keys":[]}';
        }
        location = /.well-known/openid-configuration {
            proxy_pass http://synapse_client;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Health probe (cheap timeout).
        location = /health {
            proxy_pass http://synapse_client;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
        }

        # Matrix client + federation + admin API.
        # /sync and /events need longer timeouts for long-polling.
        location ~ ^/_matrix/client/(v3|r0)/(sync|events) {
            proxy_pass http://synapse_client;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            proxy_buffering off;
        }

        # Sliding Sync long-polling — exempt from general API rate limiting
        location ~ ^/_matrix/client/(v1|unstable/org\.matrix\.msc3575|unstable/org\.matrix\.simplified_msc3575)/sync {
            proxy_pass http://synapse_client;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            proxy_buffering off;
        }

        # Login — strict rate limiting to prevent brute force
        location ~ ^/_matrix/client/(v3|r0)/login$ {
            limit_req zone=matrix_login burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://synapse_client;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # CAPTCHA — most restrictive rate limiting (before /register to avoid regex conflict)
        location ~ ^/_matrix/client/(v3|r0)/register/captcha {
            limit_req zone=matrix_captcha burst=1 nodelay;
            limit_req_status 429;
            proxy_pass http://synapse_client;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Register — rate limited
        location ~ ^/_matrix/client/(v3|r0)/register {
            limit_req zone=matrix_register burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://synapse_client;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location ~ ^(/_matrix|/_synapse) {
            limit_req zone=matrix_api burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://synapse_client;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 32k;
            proxy_busy_buffers_size 64k;
        }

        # Bare host root -> Element.
        location = / {
            return 302 https://element.test/;
        }

        access_log /var/log/nginx/matrix_access.log;
        error_log  /var/log/nginx/matrix_error.log;
    }

    # ------------------------------------------------------------------------
    # element.test — Element Web static frontend
    # ------------------------------------------------------------------------
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name element.test;

        ssl_certificate     /etc/nginx/ssl/matrix.test.crt;
        ssl_certificate_key /etc/nginx/ssl/matrix.test.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: mxc:; media-src 'self' mxc:; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

        location / {
            proxy_pass http://element_web;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        access_log /var/log/nginx/element_access.log;
        error_log  /var/log/nginx/element_error.log;
    }
}
