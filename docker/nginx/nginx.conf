# ============================================================================
# Synapse Rust + Element Web — local-dev TLS (mkcert)
# ============================================================================
# Hosts:
#   matrix.test   -> homeserver (client API + federation + .well-known)
#   element.test  -> Element Web client (statics)
#
# Add to /etc/hosts on the host machine:
#   127.0.0.1 matrix.test element.test
#
# Certs are issued via mkcert; keep matrix.test.crt / matrix.test.key in
# docker/nginx/ssl/ (mounted RO into the container).
# ============================================================================

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    client_max_body_size 50G;

    # — Rate limiting zones —————————————————————————————————————————————
    limit_req_zone $binary_remote_addr zone=matrix_api:10m rate=600r/m;
    limit_req_zone $binary_remote_addr zone=matrix_login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=matrix_register:10m rate=3r/m;
    limit_req_zone $binary_remote_addr zone=matrix_captcha:10m rate=2r/m;

    # Shared Cache-Control TTL for static resources — update once, apply everywhere.
    map $host $_static_cache_ttl { default "public, max-age=86400"; }

    upstream synapse_client {
        server synapse-rust:8008;
        keepalive 64;
    }

    upstream element_web {
        server element-web:80;
        keepalive 32;
    }

    # ------------------------------------------------------------------------
    # HTTP -> HTTPS redirect (no ACME challenge needed for local mkcert).
    # ------------------------------------------------------------------------
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name matrix.test element.test;
        return 301 https://$host$request_uri;
    }

    # ------------------------------------------------------------------------
    # matrix.test — Matrix homeserver, federation, well-known discovery
    # ------------------------------------------------------------------------
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        listen 8448 ssl;
        listen [::]:8448 ssl;
        http2 on;
        server_name matrix.test;

        ssl_certificate     /etc/nginx/ssl/matrix.test.crt;
        ssl_certificate_key /etc/nginx/ssl/matrix.test.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Custom 429 rate-limit response — returns JSON instead of default nginx HTML
        # so Matrix clients can parse the error code and implement backoff.
        error_page 429 /__rate_limited;
        location = /__rate_limited {
            internal;
            default_type application/json;
            add_header Access-Control-Allow-Origin "https://element.test" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization" always;
            add_header Access-Control-Allow-Credentials "true" always;
            return 429 '{"errcode":"M_LIMIT_EXCEEDED","error":"Too many requests"}';
        }

        # Security headers below are owned by the Rust security_headers_middleware.
        # X-Frame-Options and X-XSS-Protection remain here as a safety net; Rust
        # covers CSP (frame-src 'none'), Permissions-Policy, HSTS, X-Content-Type-Options,
        # and Referrer-Policy for all proxied API responses.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # .well-known/matrix discovery (served directly by nginx).
        location /.well-known/matrix/server {
            default_type application/json;
            add_header Access-Control-Allow-Origin "*";
            return 200 '{"m.server":"matrix.test:443"}';
        }
        location /.well-known/matrix/client {
            default_type application/json;
            add_header Access-Control-Allow-Origin "*";
            return 200 '{"m.homeserver":{"base_url":"https://matrix.test"}}';
        }
        location /.well-known/matrix/support {
            default_type application/json;
            add_header Access-Control-Allow-Origin "*";
            return 200 '{"contacts":[{"matrix_id":"@admin:matrix.test","role":"m.admin"}]}';
        }

        # Keep JWKS as a local fallback, but let OpenID discovery come from the
        # homeserver so nginx does not mask newer server-side capability work.
        location = /.well-known/jwks.json {
            default_type application/json;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            return 200 '{"keys":[]}';
        }
        location = /.well-known/openid-configuration {
            proxy_pass http://synapse_client;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Health probe (cheap timeout).
        location = /health {
            proxy_pass http://synapse_client;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
        }

        # Matrix long-polling endpoints should bypass generic proxy buffering and
        # stay outside the general API limiter path.
        location ~ ^/_matrix/client/(v3|r0|v1)/(sync|events)$ {
            proxy_pass http://synapse_client;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 60s;
            proxy_send_timeout 180s;
            proxy_read_timeout 180s;
            proxy_buffering off;
            proxy_request_buffering off;
            
            # Clear any backend CORS headers to avoid duplicates
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            
            # Add CORS headers for Element Web
            add_header Access-Control-Allow-Origin "https://element.test" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization" always;
            add_header Access-Control-Allow-Credentials "true" always;
            
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Sliding Sync long-polling — exempt from general API rate limiting
        location ~ ^/_matrix/client/(v1|unstable/org\.matrix\.msc3575|unstable/org\.matrix\.simplified_msc3575)/sync {
            proxy_pass http://synapse_client;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            proxy_buffering off;
            
            # Clear any backend CORS headers to avoid duplicates
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            
            # Add CORS headers for Element Web
            add_header Access-Control-Allow-Origin "https://element.test" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization" always;
            add_header Access-Control-Allow-Credentials "true" always;
            
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Login — strict rate limiting to prevent brute force
        location ~ ^/_matrix/client/(v3|r0)/login$ {
            limit_req zone=matrix_login burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://synapse_client;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Clear any backend CORS headers to avoid duplicates
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            
            # Add CORS headers for Element Web
            add_header Access-Control-Allow-Origin "https://element.test" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization" always;
            add_header Access-Control-Allow-Credentials "true" always;
            
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # CAPTCHA — most restrictive rate limiting (before /register to avoid regex conflict)
        location ~ ^/_matrix/client/(v3|r0)/register/captcha {
            limit_req zone=matrix_captcha burst=1 nodelay;
            limit_req_status 429;
            proxy_pass http://synapse_client;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Clear any backend CORS headers to avoid duplicates
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            
            # Add CORS headers for Element Web
            add_header Access-Control-Allow-Origin "https://element.test" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization" always;
            add_header Access-Control-Allow-Credentials "true" always;
            
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Register — rate limited
        location ~ ^/_matrix/client/(v3|r0)/register {
            limit_req zone=matrix_register burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://synapse_client;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Clear any backend CORS headers to avoid duplicates
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            
            # Add CORS headers for Element Web
            add_header Access-Control-Allow-Origin "https://element.test" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization" always;
            add_header Access-Control-Allow-Credentials "true" always;
            
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        location ~ ^(/_matrix|/_synapse) {
            limit_req zone=matrix_api burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://synapse_client;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 32k;
            proxy_busy_buffers_size 64k;
            
            # Clear any backend CORS headers to avoid duplicates
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            
            # Add CORS headers for Element Web
            add_header Access-Control-Allow-Origin "https://element.test" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization" always;
            add_header Access-Control-Allow-Credentials "true" always;
            
            # Handle preflight OPTIONS requests
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Bare host root -> Element.
        location = / {
            return 302 https://element.test/;
        }

        access_log /var/log/nginx/matrix_access.log;
        error_log  /var/log/nginx/matrix_error.log;
    }

    # ------------------------------------------------------------------------
    # element.test — Element Web static frontend
    # ------------------------------------------------------------------------
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name element.test;
        charset utf-8;

        ssl_certificate     /etc/nginx/ssl/matrix.test.crt;
        ssl_certificate_key /etc/nginx/ssl/matrix.test.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Language "zh-Hans" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: mxc:; media-src 'self' mxc:; connect-src 'self' https://matrix.test wss://matrix.test https://element.test wss://element.test; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

        # ------------------------------------------------------------------
        # Static resource fallbacks — suppress 404 noise for common requests.
        # Content-hash suffixes in redirect targets (e.g. /vector-icons/180.30b915f.png)
        # will break on every Element Web bundle update — these must be updated
        # to match after each build. See element-web Dockerfile for current hashes.
        # ------------------------------------------------------------------

        # favicon.ico — served from disk instead of inline hex.
        location = /favicon.ico {
            alias /usr/share/nginx/static/favicon.ico;
            add_header Cache-Control $_static_cache_ttl;
        }

        # robots.txt — allow all crawlers.
        location = /robots.txt {
            default_type text/plain;
            add_header Cache-Control $_static_cache_ttl;
            return 200 "User-agent: *\nAllow: /\n";
        }

        # apple-touch-icon — redirect to whichever PNG exists in vector-icons.
        location ~ ^/apple-touch-icon(-precomposed)?\.png$ {
            return 302 /vector-icons/;
        }

        # manifest.webmanifest — redirect to manifest.json (Element Web uses .json extension).
        location = /manifest.webmanifest {
            return 302 /manifest.json;
        }

        # service-worker.js — Element Web doesn't ship a SW; return 204 No Content
        # to suppress console 404 noise without caching a 404 response
        location = /service-worker.js {
            add_header Cache-Control "no-store" always;
            return 204;
        }

        # config.electron.json — suppress Electron desktop config 404 in browser
        # context. Element Web requests this unconditionally; returning 204
        # eliminates a red console error on every page load.
        location = /config.electron.json {
            add_header Cache-Control "no-store" always;
            return 204;
        }

        # Element logo SVGs — redirect both light/dark variants to the bundled desktop logo.
        location ~ ^/img/element-logo(-dark)?\.svg$ {
            return 302 /img/element-desktop-logo.f4b4c62.svg;
        }

        location = /force-zh.js {
            default_type application/javascript;
            add_header Cache-Control "no-store" always;
            return 200 '(function(){var locale="zh_Hans";var langs=["zh_Hans","zh-Hans","zh-CN","zh-cn","zh"];try{["mx_language","mx_lang","language","lang","locale","i18nextLng"].forEach(function(key){window.localStorage.setItem(key, locale);});}catch(e){}try{Object.defineProperty(navigator,"language",{configurable:true,get:function(){return locale;}});Object.defineProperty(navigator,"languages",{configurable:true,get:function(){return langs;}});Object.defineProperty(navigator,"userLanguage",{configurable:true,get:function(){return locale;}});}catch(e){}try{document.documentElement.lang="zh-Hans";}catch(e){}try{if("serviceWorker" in navigator){navigator.serviceWorker.getRegistrations().then(function(regs){regs.forEach(function(reg){reg.unregister();});});}if("caches" in window){caches.keys().then(function(keys){keys.forEach(function(key){caches.delete(key);});});}}catch(e){}})();';
        }

        location = /friend-entry.js {
            default_type application/javascript;
            add_header Cache-Control "no-store" always;
            return 200 '(function(){function mount(){if(document.getElementById("synapse-friend-entry"))return;var a=document.createElement("a");a.id="synapse-friend-entry";a.href="/friends/";a.textContent="好友中心";a.setAttribute("aria-label","打开好友中心");a.style.cssText="position:fixed;right:20px;bottom:20px;z-index:2147483647;padding:10px 14px;border-radius:999px;background:#0dbd8b;color:#fff;text-decoration:none;font:600 14px/1.2 -apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Hiragino Sans GB,Microsoft YaHei,sans-serif;box-shadow:0 8px 24px rgba(0,0,0,.18)";document.body.appendChild(a);}if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",mount);}else{mount();}})();';
        }

        location = /friend-session-bridge.js {
            default_type application/javascript;
            add_header Cache-Control "no-store" always;
            return 200 '(function(){var KEY="synapse_friend_center_bridge_v1";var HOME="https://matrix.test";function save(token){if(!token)return;try{localStorage.setItem(KEY,JSON.stringify({accessToken:token,homeserver:HOME,updatedAt:Date.now()}));}catch(e){}}function extract(headers){if(!headers)return "";if(typeof headers.get==="function"){var v=headers.get("Authorization")||headers.get("authorization");return v||"";}if(Array.isArray(headers)){for(var i=0;i<headers.length;i++){var row=headers[i];if(row&&String(row[0]).toLowerCase()==="authorization")return row[1]||"";}return "";}if(typeof headers==="object"){for(var k in headers){if(String(k).toLowerCase()==="authorization")return headers[k]||"";}}return "";}function capture(value){if(!value)return;var text=String(value);if(text.slice(0,7).toLowerCase()!=="bearer ")return;save(text.slice(7));}var origFetch=window.fetch;if(origFetch){window.fetch=function(input,init){try{capture(extract(init&&init.headers));}catch(e){}return origFetch.apply(this,arguments);};}var origOpen=XMLHttpRequest.prototype.open;var origSetHeader=XMLHttpRequest.prototype.setRequestHeader;XMLHttpRequest.prototype.open=function(){this.__friendAuth="";return origOpen.apply(this,arguments);};XMLHttpRequest.prototype.setRequestHeader=function(name,value){try{if(String(name).toLowerCase()==="authorization")this.__friendAuth=value||"";capture(value);}catch(e){}return origSetHeader.apply(this,arguments);};setInterval(function(){try{var raw=localStorage.getItem(KEY);if(!raw)return;var parsed=JSON.parse(raw);if(parsed&&parsed.updatedAt&&Date.now()-parsed.updatedAt>7*24*60*60*1000){localStorage.removeItem(KEY);}}catch(e){}},60000);})();';
        }

        location = /friends {
            return 302 /friends/;
        }

        location /friends/ {
            alias /usr/share/nginx/friends/;
            index index.html;
            try_files $uri $uri/ /friends/index.html;

            # Override server-level CSP to allow inline scripts required by the
            # friends center SPA. The parent server block's CSP headers are replaced
            # by nginx when add_header appears in a child location, so all security
            # headers must be repeated here.
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Language "zh-Hans" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), interest-cohort=()" always;
            add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: mxc:; media-src 'self' mxc:; connect-src 'self' https://matrix.test wss://matrix.test https://element.test wss://element.test; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;
        }

        location / {
            proxy_pass http://element_web;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            sub_filter_once on;
            sub_filter '<html lang="en"' '<html lang="zh-Hans"';
            sub_filter '</head>' '<script src="/force-zh.js"></script><script src="/friend-session-bridge.js"></script><script src="/friend-entry.js"></script></head>';
        }

        access_log /var/log/nginx/element_access.log;
        error_log  /var/log/nginx/element_error.log;
    }
}
