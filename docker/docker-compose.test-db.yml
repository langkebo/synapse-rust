# Lightweight PostgreSQL for integration tests — starts ONLY the database
# (no synapse-rust, Redis, Nginx). Use this when you just need a DB to run
# `cargo nextest run --test integration`.
#
# Usage:
#   cd docker
#   docker compose -f docker-compose.test-db.yml up -d
#   cd ..
#   cargo nextest run --profile test --features privacy-ext,voice-extended,voip-tracking,beacons,server-notifications --test integration
#   cd docker && docker compose -f docker-compose.test-db.yml down

services:
  db:
    image: postgres:16
    container_name: synapse-test-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: synapse_test
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --lc-collate=C --lc-ctype=C
    ports:
      - "5432:5432"
    volumes:
      - test_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse -d synapse_test"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  test_postgres_data:
