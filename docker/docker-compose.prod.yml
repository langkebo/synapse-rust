services:
  db:
    image: postgres:15-alpine
    container_name: synapse_db_prod
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./config/postgres.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - synapse_net

  redis:
    image: redis:7-alpine
    container_name: synapse_redis_prod
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - synapse_net

  synapse-main:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      platforms:
        - linux/arm64
        - linux/amd64
    image: synapse-rust-main:latest
    container_name: synapse_main_prod
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - SYNAPSE_CONFIG_PATH=/app/config/homeserver.yaml
      - WORKER_ROLE=main
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - OLM_PICKLE_KEY=${OLM_PICKLE_KEY}
      - SYNAPSE_DB_HOST=db
      - SYNAPSE_DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RUN_MIGRATIONS=true
    volumes:
      - ./config/homeserver.yaml:/app/config/homeserver.yaml:ro
      - synapse_media:/app/data/media
      - synapse_data:/app/data
    ports:
      - "8008:8008"
      - "8448:8448"
      - "9090:9090"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64M
    networks:
      - synapse_net

  synapse-worker:
    image: synapse-rust-main:latest
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - SYNAPSE_CONFIG_PATH=/app/config/homeserver.yaml
      - WORKER_ROLE=worker
      - SYNAPSE_DB_HOST=db
      - SYNAPSE_DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./config/homeserver.yaml:/app/config/homeserver.yaml:ro
      - synapse_media:/app/data/media
      - synapse_data:/app/data
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      synapse-main:
        condition: service_started
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64M
    networks:
      - synapse_net

volumes:
  db_data:
  redis_data:
  synapse_media:
  synapse_data:

networks:
  synapse_net:
    driver: bridge