# =============================================================================
# Extension Migration Map
# =============================================================================
# Format: <migration_filename>=<feature_name>
#
# Migrations NOT listed here are always applied (core).
# Migrations listed here are only applied when the corresponding feature
# is present in the ENABLED_EXTENSIONS environment variable.
#
# Feature names match Cargo feature flags:
#   openclaw-routes, friends, voice-extended, saml-sso, cas-sso,
#   beacons, voip-tracking, widgets, server-notifications,
#   burn-after-read, privacy-ext, external-services
# =============================================================================

# Extension baseline schemas (extracted from unified schema)
00000001_extensions_cas.sql=cas-sso
00000001_extensions_saml.sql=saml-sso
00000001_extensions_voice.sql=voice-extended
00000001_extensions_friends.sql=friends
00000001_extensions_privacy.sql=privacy-ext

# OpenClaw AI integration (incremental migrations)
20260403000001_add_openclaw_integration.sql=openclaw-routes
20260407000001_add_ai_connections.sql=openclaw-routes

# Note: The unified schema (00000000_unified_schema_v6.sql) still contains
# all extension table definitions with IF NOT EXISTS for backward compatibility
# with already-deployed databases. The extension files above are used by
# container-migrate.sh to filter which tables get created on new deployments
# when ENABLED_EXTENSIONS != "all".
#
# Beacon and VoIP tracking tables are in 20260404000001_consolidated_schema_alignment.sql
# which also contains core tables, so it is always applied.
