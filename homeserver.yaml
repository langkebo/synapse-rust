server_name: "${SERVER_NAME:-cjystx.top}"

server:
  name: "${SERVER_NAME:-cjystx.top}"
  host: "0.0.0.0"
  port: 8008
  http_port: 8008
  https_port: 8448
  bind_address: "0.0.0.0"
  public_baseurl: "${PUBLIC_BASEURL:-https://matrix.cjystx.top}"
  signing_key_path: "/app/data/signing.key"
  macaroon_secret_key: "${MACAROON_SECRET:?MACAROON_SECRET is required}"
  form_secret: "${FORM_SECRET:?FORM_SECRET is required}"
  registration_shared_secret: "${REGISTRATION_SECRET:?REGISTRATION_SECRET is required}"
  max_upload_size: 104857600
  max_image_resolution: 1920
  enable_registration: true
  enable_registration_captcha: false
  background_tasks_interval: 3600
  expire_access_token: false
  expire_access_token_lifetime: 86400
  refresh_token_lifetime: 604800
  refresh_token_sliding_window_size: 2592000
  # Sessions API 配置
  session_duration: 86400
  warmup_pool: true

database:
  host: "192.168.97.3"
  port: 5432
  username: "${DB_USER:-synapse}"
  password: "${DB_PASSWORD:?DB_PASSWORD is required}"
  name: "${DB_NAME:-synapse}"
  pool_size: 10
  max_size: 20
  min_idle: 2
  connection_timeout: 30

redis:
  host: "192.168.97.2"
  port: 6379
  key_prefix: "synapse:"
  pool_size: 10
  enabled: true
  connection_timeout_ms: 5000
  command_timeout_ms: 3000

logging:
  level: "info"
  format: "text"

federation:
  enabled: true
  allow_ingress: true
  server_name: "${SERVER_NAME:-cjystx.top}"
  federation_port: 8448
  connection_pool_size: 100
  max_transaction_payload: 10485760
  # Federation 签名密钥 - 留空则从数据库读取
  # signing_key: ""

security:
  secret: "${SECRET_KEY:?SECRET_KEY is required}"
  expiry_time: 3600
  refresh_token_expiry: 604800

# Identity Server 配置 - 使用 Matrix.org 公共服务
identity_server_url: "https://vector.im"

search:
  elasticsearch_url: "http://localhost:9200"
  enabled: false

rate_limit:
  enabled: false

admin_registration:
  enabled: true
  secret: "${ADMIN_REGISTRATION_SECRET:?ADMIN_REGISTRATION_SECRET is required}"
  shared_secret: "${ADMIN_SECRET:?ADMIN_SECRET is required}"

worker:
  enabled: false

cors:
  allowed_origins:
    - "http://localhost:8008"
    - "http://127.0.0.1:8008"
    - "http://localhost:6130"
    - "http://127.0.0.1:6130"
    - "tauri://localhost"
    - "https://tauri.localhost"
    - "vector://vector"
    - "vector://riot"
    - "file://"
  allow_credentials: true
  allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
  allowed_headers:
    - "Authorization"
    - "Content-Type"
    - "Accept"
    - "Origin"
    - "X-Requested-With"
    - "X-Matrix-Auth"
  expose_headers:
    - "X-Matrix-Error"
    - "X-Ratelimit-Limit"
    - "X-Ratelimit-Remaining"
  max_age_seconds: 3600

smtp:
  enabled: false

# VoIP/TURN 配置 - 使用 Matrix.org 公共服务
voip:
  enabled: true
  turn_uris:
    - "turn:vector.im:3478"
  turn_username: "matrix"
  turn_password: "${TURN_PASSWORD:?TURN_PASSWORD is required}"

push:
  enabled: false

url_preview:
  enabled: false

# =============================================================================
# OIDC (OpenID Connect) 单点登录配置
# =============================================================================
# 支持三种模式：
#   1. external OIDC — 对接外部 IdP（如 Keycloak、Auth0、Google Identity）
#   2. builtin OIDC — 内置 OIDC Provider（编译时启用 `builtin-oidc` feature）
#   3. 生产 IdP 模式 — external OIDC + 生产级签发者（如 MAS/ESS）
#
# 回调安全：
#   - PKCE S256 强制校验（verifier 长度 43-128 字符）
#   - State 一次性使用，600 秒过期自动清理
#   - 回调 URL 白名单校验（拒绝 javascript:/data: 协议、localhost/IP 地址）
#   - OIDC subject 与本地账号冲突时拒绝登录（防止账号接管）
#   - 首次登录创建 OIDC 映射记录，后续登录绑定同一 subject
#
# 运维说明：
#   - 生产环境必须使用 HTTPS 回调 URL
#   - issuer 须与 IdP 的 .well-known/openid-configuration 一致
#   - client_secret 须通过环境变量注入，禁止硬编码
#   - 启用 builtin-oidc 时，`/.well-known/openid-configuration` 与 `/.well-known/jwks.json` 由内置 provider 提供
#   - 未启用任何 OIDC/SAML 时，`/.well-known/*` 返回空 JWKS 集合
#   - 单位测试覆盖：OIDC auth session 往返、一次性使用、PKCE 绑定校验、discovery 结构
oidc:
  enabled: true
  issuer: "http://localhost:8180/realms/matrix"
  client_id: "synapse"
  client_secret: "${OIDC_CLIENT_SECRET:?OIDC_CLIENT_SECRET is required}"
  scopes:
    - "openid"
    - "profile"
    - "email"
  attribute_mapping:
    localpart: "preferred_username"
    displayname: "name"
    email: "email"
  callback_url: "http://localhost:8008/_matrix/client/v3/oidc/callback"
  allow_existing_users: true
  block_unknown_users: false

saml:
  enabled: false

# Retention 配置
retention:
  enabled: true
  default_policy:
    min_lifetime: 1
    max_lifetime: 90

telemetry:
  enabled: false
  service_name: "synapse-rust"
  service_version: "0.1.0"
  service_namespace: "matrix"
  trace_enabled: false
  metrics_enabled: false
  logs_enabled: false
  sampling_ratio: 1.0
  batch_export: true
  export_timeout_seconds: 30
  max_queue_size: 2048
  max_export_batch_size: 512
  scheduled_delay_millis: 5000

jaeger:
  enabled: false
  service_name: "synapse-rust"
  sampling_rate: 1.0

prometheus:
  enabled: false
  port: 9090
  path: "/metrics"
  include_namespace: true

# Bridges 配置 - 使用 Matrix.org 公共服务
bridges:
  # Telegram Bridge
  telegram:
    enabled: true
    api_id: "YOUR_API_ID"
    api_hash: "YOUR_API_HASH"
    bot_token: "YOUR_BOT_TOKEN"

  # IRC Bridge (可选)
  irc:
    enabled: false
    servers:
      - address: "irc.libera.chat"
        ports: [6697]
        tls: true

# App Service 配置 - 准备对接 OpenClaw
app_service:
  enabled: true
  appservice:
    - id: "openclaw"
      url: "http://host.docker.internal:8080"
      as_token: "${OPENCLAW_AS_TOKEN:?OPENCLAW_AS_TOKEN is required}"
      hs_token: "${OPENCLAW_HS_TOKEN:?OPENCLAW_HS_TOKEN is required}"
      sender_localpart: "openclaw"
      names:
        - "OpenClaw Bot"
      namespaces:
        users:
          - exclusive: true
            regex: "@openclaw_.*:cjystx.top"
        rooms:
          - exclusive: false
            regex: "!openclaw_.*:cjystx.top"
