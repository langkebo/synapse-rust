server_name: "cjystx.top"

server:
  name: "cjystx.top"
  host: "0.0.0.0"
  port: 8008
  http_port: 8008
  https_port: 8448
  bind_address: "0.0.0.0"
  public_baseurl: "https://matrix.cjystx.top"
  signing_key_path: "/app/data/signing.key"
  macaroon_secret_key: "change-me-macaroon-secret"
  form_secret: "change-me-form-secret"
  registration_shared_secret: "change-me-registration-secret"
  max_upload_size: 104857600
  max_image_resolution: 1920
  enable_registration: true
  enable_registration_captcha: false
  background_tasks_interval: 3600
  expire_access_token: false
  expire_access_token_lifetime: 86400
  refresh_token_lifetime: 604800
  refresh_token_sliding_window_size: 2592000
  # Sessions API 配置
  session_duration: 86400
  warmup_pool: true

database:
  host: "192.168.97.3"
  port: 5432
  username: "synapse"
  password: "ypSgEf1Y8YzivoBsRFnHvH4JLwn2nspX"
  name: "synapse"
  pool_size: 10
  max_size: 20
  min_idle: 2
  connection_timeout: 30

redis:
  host: "192.168.97.2"
  port: 6379
  key_prefix: "synapse:"
  pool_size: 10
  enabled: true
  connection_timeout_ms: 5000
  command_timeout_ms: 3000

logging:
  level: "info"
  format: "text"

federation:
  enabled: true
  allow_ingress: true
  server_name: "cjystx.top"
  federation_port: 8448
  connection_pool_size: 100
  max_transaction_payload: 10485760
  # Federation 签名密钥 - 留空则从数据库读取
  # signing_key: ""

security:
  secret: "change_me_jwt_secret_which_is_very_long_at_least_32_bytes_12345"
  expiry_time: 3600
  refresh_token_expiry: 604800

# Identity Server 配置 - 使用 Matrix.org 公共服务
identity_server_url: "https://vector.im"

search:
  elasticsearch_url: "http://localhost:9200"
  enabled: false

rate_limit:
  enabled: false

admin_registration:
  enabled: true
  secret: "change-me-admin-secret"
  shared_secret: "change-me-admin-shared-secret"

worker:
  enabled: false

cors:
  allowed_origins: ["*"]
  allow_credentials: true
  allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  allowed_headers: ["*"]
  max_age_seconds: 3600

smtp:
  enabled: false

# VoIP/TURN 配置 - 使用 Matrix.org 公共服务
voip:
  enabled: true
  turn_uris:
    - "turn:vector.im:3478"
  turn_username: "matrix"
  turn_password: "change-me-turn-password"

push:
  enabled: false

url_preview:
  enabled: false

oidc:
  enabled: true
  issuer: "http://localhost:8180/realms/matrix"
  client_id: "synapse"
  client_secret: "change-me-oidc-client-secret"
  scopes:
    - "openid"
    - "profile"
    - "email"
  attribute_mapping:
    localpart: "preferred_username"
    displayname: "name"
    email: "email"
  callback_url: "http://localhost:8008/_matrix/client/v3/oidc/callback"
  allow_existing_users: true
  block_unknown_users: false

saml:
  enabled: false

# Retention 配置
retention:
  enabled: true
  default_policy:
    min_lifetime: 1
    max_lifetime: 90

telemetry:
  enabled: false
  service_name: "synapse-rust"
  service_version: "0.1.0"
  service_namespace: "matrix"
  trace_enabled: false
  metrics_enabled: false
  logs_enabled: false
  sampling_ratio: 1.0
  batch_export: true
  export_timeout_seconds: 30
  max_queue_size: 2048
  max_export_batch_size: 512
  scheduled_delay_millis: 5000

jaeger:
  enabled: false
  service_name: "synapse-rust"
  sampling_rate: 1.0

prometheus:
  enabled: false
  port: 9090
  path: "/metrics"
  include_namespace: true

# Bridges 配置 - 使用 Matrix.org 公共服务
bridges:
  # Telegram Bridge
  telegram:
    enabled: true
    api_id: "YOUR_API_ID"
    api_hash: "YOUR_API_HASH"
    bot_token: "YOUR_BOT_TOKEN"
  
  # IRC Bridge (可选)
  irc:
    enabled: false
    servers:
      - address: "irc.libera.chat"
        ports: [6697]
        tls: true

# App Service 配置 - 准备对接 OpenClaw
app_service:
  enabled: true
  appservice:
    - id: "openclaw"
      url: "http://host.docker.internal:8080"
      as_token: "openclaw_as_token_change_this"
      hs_token: "openclaw_hs_token_change_this"
      sender_localpart: "openclaw"
      names:
        - "OpenClaw Bot"
      namespaces:
        users:
          - exclusive: true
            regex: "@openclaw_.*:cjystx.top"
        rooms:
          - exclusive: false
            regex: "!openclaw_.*:cjystx.top"
