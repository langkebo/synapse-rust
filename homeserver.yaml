server_name: "localhost"
pid_file: /tmp/synapse.pid
web_client: false
soft_file_limit: 0

listeners:
  - port: 8008
    tls: false
    bind_addresses: ['0.0.0.0']
    type: http
    x_forwarded: false
    resources:
      - names: [client]
        compress: true
      - names: [federation]
        compress: false
  - port: 8448
    tls: false
    bind_addresses: ['0.0.0.0']
    type: http

database:
  name: "psycopg2"
  args:
    user: "synapse"
    password: "synapse"
    database: "synapse_test"
    host: "localhost"
    port: 5432

redis:
  enabled: false

macaroon_secret_key: "test_secret_key_for_development_only_12345"
secret_key: "test_secret_key_for_development_only_12345"
registration_shared_secret: "test_shared_secret"
report_stats: false
