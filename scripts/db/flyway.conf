# Flyway Configuration for synapse-rust
# https://flywaydb.org/documentation/configuration/

flyway.url=jdbc:postgresql://${FLYWAY_DB_HOST:localhost}:${FLYWAY_DB_PORT:5432}/${FLYWAY_DB_NAME:synapse}
flyway.user=${FLYWAY_DB_USER:synapse}
flyway.password=${FLYWAY_DB_PASSWORD:synapse}
flyway.schemas=synapse,public
flyway.defaultSchema=synapse
flyway.table=schema_migrations

# Locations
flyway.locations=filesystem:./migrations,filesystem:./migrations/incremental

# Baseline
flyway.baselineOnMigrate=true
flyway.baselineVersion=00000000

# Validation
flyway.validateOnMigrate=true
flyway.cleanDisabled=true

# Encoding
flyway.encoding=UTF-8

# Placeholders
flyway.placeholders.appliedBy=flyway
flyway.placeholders.executedAt=NOW()

# Output
flyway.outout=true
flyway.colors=false

# Retry
flyway.retryCount=3

# Oracle compat (disabled for PostgreSQL)
flyway.oracle.sqlplus=false
